<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:,">
  <title>Dirong Recording + STT Dashboard</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f7f4;
      --panel: #ffffff;
      --ink: #1f2328;
      --muted: #646b75;
      --line: #d9dfe7;
      --accent: #0f766e;
      --warn: #a15c00;
      --error: #b42318;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, "Malgun Gothic", sans-serif;
      background: var(--bg);
      color: var(--ink);
      letter-spacing: 0;
    }
    header {
      padding: 18px 24px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }
    h1 { margin: 0; font-size: 22px; }
    main { max-width: 1240px; margin: 0 auto; padding: 20px; }
    section { margin: 0 0 22px; }
    h2 { font-size: 16px; margin: 0 0 10px; }
    .grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; }
    .pipeline-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; }
    .metric {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      min-height: 74px;
    }
    .label { color: var(--muted); font-size: 12px; margin-bottom: 8px; }
    .value { font-size: 15px; overflow-wrap: anywhere; }
    .display-title { font-size: 15px; font-weight: 700; overflow-wrap: anywhere; }
    .display-desc, .display-next { margin-top: 5px; line-height: 1.4; }
    .display-next { color: var(--ink); }
    .display-details-table pre {
      border: 0;
      border-radius: 0;
      padding: 0;
      background: transparent;
      max-height: 180px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }
    th, td {
      padding: 8px 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
      font-size: 13px;
      overflow-wrap: anywhere;
    }
    th { color: var(--muted); font-weight: 600; background: #fbfbf9; }
    tr:last-child td { border-bottom: 0; }
    code { font-family: Consolas, monospace; font-size: 12px; }
    pre {
      margin: 0;
      padding: 12px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      max-height: 360px;
      overflow: auto;
      font-family: Consolas, "Malgun Gothic", monospace;
      font-size: 13px;
    }
    audio { width: 220px; max-width: 100%; height: 32px; }
    .status { color: var(--accent); font-weight: 700; }
    .warn { color: var(--warn); }
    .error { color: var(--error); }
    .muted { color: var(--muted); }
    .toolbar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin: 10px 0; }
    .setup-shell {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    .setup-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 14px;
    }
    .setup-title { margin: 0; font-size: 20px; }
    .setup-progress {
      min-width: 128px;
      color: var(--muted);
      font-size: 13px;
      text-align: right;
    }
    .setup-layout { display: grid; grid-template-columns: 260px minmax(0, 1fr); gap: 16px; }
    .setup-steps { display: grid; gap: 6px; align-content: start; }
    .setup-step {
      width: 100%;
      text-align: left;
      border-radius: 6px;
      background: #ffffff;
    }
    .setup-step.is-active { border-color: var(--accent); color: var(--accent); font-weight: 700; }
    .setup-step.is-ready { color: var(--accent); }
    .setup-panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      background: #fbfbf9;
    }
    .setup-panel h3 { margin: 0 0 8px; font-size: 18px; }
    .setup-copy { margin: 0 0 12px; color: var(--muted); line-height: 1.45; }
    .setup-cards { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; margin: 10px 0; }
    .setup-card {
      display: block;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #ffffff;
      cursor: pointer;
      min-height: 88px;
    }
    .setup-card input { width: auto; margin-right: 8px; }
    .setup-card strong { display: inline-block; margin-bottom: 6px; }
    .setup-card.is-selected { border-color: var(--accent); box-shadow: inset 0 0 0 1px var(--accent); }
    .setup-form { display: grid; gap: 10px; max-width: 720px; }
    .setup-form label { display: grid; gap: 5px; color: var(--muted); font-size: 13px; }
    .setup-form input[type="password"], .setup-form input[type="url"] {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 7px;
      font: inherit;
      color: var(--ink);
      background: #ffffff;
    }
    .setup-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; align-items: center; }
    .setup-result {
      margin-top: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #ffffff;
    }
    .setup-result:empty { display: none; }
    .setup-status-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; margin-top: 12px; }
    .setup-status-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #ffffff;
      min-height: 86px;
    }
    .setup-guild-list { display: grid; gap: 8px; margin-top: 10px; }
    .setup-guild {
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #ffffff;
      cursor: pointer;
    }
    .setup-guild input { width: auto; }
    .setup-notice {
      border-left: 4px solid var(--warn);
      background: #fff7ed;
      padding: 10px 12px;
      border-radius: 6px;
      color: #7c2d12;
      margin: 10px 0;
    }
    .setup-ok {
      border-left-color: var(--accent);
      background: #ecfdf5;
      color: #065f46;
    }
    button {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #ffffff;
      color: var(--ink);
      padding: 7px 10px;
      cursor: pointer;
    }
    button:disabled { color: var(--muted); cursor: not-allowed; background: #f3f4f6; }
    textarea, input[type="number"], input[type="text"], select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 7px;
      font: inherit;
      color: var(--ink);
      background: #ffffff;
    }
    textarea { min-height: 72px; resize: vertical; }
    input[type="number"] { max-width: 96px; }
    .relation-fields { margin-top: 8px; display: grid; gap: 6px; }
    .relation-fields label { display: block; }
    .app-shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(236px, 280px) minmax(0, 1fr);
    }
    .sidebar {
      position: sticky;
      top: 0;
      align-self: start;
      min-height: 100vh;
      padding: 18px 14px;
      border-right: 1px solid var(--line);
      background: #fffaf4;
    }
    .brand-block {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 8px 18px;
      border-bottom: 1px solid var(--line);
    }
    .brand-avatar {
      width: 42px;
      height: 42px;
      object-fit: contain;
      border-radius: 8px;
      background: #ffffff;
      border: 1px solid var(--line);
    }
    .brand-title { font-weight: 800; font-size: 18px; }
    .brand-subtitle { color: var(--muted); font-size: 12px; margin-top: 2px; }
    .sidebar-group { margin-top: 18px; display: grid; gap: 8px; }
    .sidebar-label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
    }
    .nav-stack { display: grid; gap: 6px; }
    .nav-button, .server-button {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      text-align: left;
      border-radius: 8px;
      min-height: 38px;
    }
    .nav-button.is-active {
      border-color: #f97316;
      background: #fff7ed;
      color: #9a3412;
      font-weight: 700;
    }
    .server-button {
      background: #ffffff;
      border-color: #f2d7bd;
    }
    .main-shell {
      min-width: 0;
      max-width: 1280px;
      width: 100%;
      margin: 0 auto;
      padding: 18px 20px 36px;
    }
    .content-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      padding: 0 0 16px;
      margin-bottom: 16px;
      border-bottom: 1px solid var(--line);
      background: transparent;
    }
    .content-header h1 { font-size: 24px; }
    .status-chip-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .status-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 9px;
      background: var(--panel);
      font-size: 12px;
      white-space: nowrap;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #9ca3af;
      flex: 0 0 auto;
    }
    .tone-ready .status-dot, .card-state-ready { background: #16a34a; }
    .tone-progress .status-dot, .card-state-progress { background: #f59e0b; }
    .tone-danger .status-dot, .card-state-danger { background: #dc2626; }
    .tone-muted .status-dot, .card-state-muted { background: #9ca3af; }
    .sticky-warning {
      position: sticky;
      top: 0;
      z-index: 3;
      margin: -18px -20px 16px;
      padding: 10px 20px;
      border-bottom: 1px solid #fecaca;
      background: #fef2f2;
      color: #991b1b;
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .sticky-warning.is-visible { display: flex; }
    .sticky-warning button {
      border-color: #fca5a5;
      background: #ffffff;
      color: #991b1b;
      font-weight: 700;
    }
    .app-view[hidden] { display: none; }
    .flow-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 18px;
    }
    .flow-card, .content-band, .locked-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
    }
    .flow-card {
      min-height: 150px;
      display: grid;
      gap: 8px;
      align-content: start;
    }
    .flow-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .flow-card h3 { margin: 0; font-size: 15px; }
    .card-state {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex: 0 0 auto;
    }
    .content-band { margin-bottom: 18px; }
    .section-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }
    .section-heading h2 { margin: 0; }
    .locked-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 18px;
    }
    .locked-card {
      border-color: #fecaca;
      background: #fff7f7;
    }
    .summary-list {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin: 0 0 10px;
    }
    .summary-pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 5px 8px;
      font-size: 12px;
      color: var(--muted);
      background: #fbfbf9;
    }
    .participant-list, .required-field-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }
    .participant-item, .required-field {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fbfbf9;
    }
    .required-field.is-missing {
      border-color: #fecaca;
      background: #fff7f7;
      color: #991b1b;
    }
    .tab-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 10px;
      margin-bottom: 8px;
    }
    .tab-button {
      white-space: nowrap;
      border-radius: 999px;
    }
    .tab-button.is-active {
      border-color: #f97316;
      background: #fff7ed;
      color: #9a3412;
      font-weight: 700;
    }
    .settings-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .theme-options {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .theme-options label {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 9px;
      background: #ffffff;
    }
    body[data-theme="dark"] {
      color-scheme: dark;
      --bg: #171717;
      --panel: #24201d;
      --ink: #f5f5f4;
      --muted: #b8b2aa;
      --line: #4b4038;
      --accent: #fb923c;
      --warn: #fbbf24;
      --error: #f87171;
      background: var(--bg);
    }
    body[data-theme="dark"] .sidebar { background: #201a17; }
    body[data-theme="dark"] button,
    body[data-theme="dark"] input,
    body[data-theme="dark"] textarea,
    body[data-theme="dark"] select,
    body[data-theme="dark"] .metric,
    body[data-theme="dark"] .setup-card,
    body[data-theme="dark"] .setup-panel,
    body[data-theme="dark"] .setup-status-card,
    body[data-theme="dark"] .participant-item,
    body[data-theme="dark"] .required-field,
    body[data-theme="dark"] .summary-pill {
      background: #2d2824;
      color: var(--ink);
    }
    @media (prefers-color-scheme: dark) {
      body[data-theme="system"] {
        color-scheme: dark;
        --bg: #171717;
        --panel: #24201d;
        --ink: #f5f5f4;
        --muted: #b8b2aa;
        --line: #4b4038;
        --accent: #fb923c;
        --warn: #fbbf24;
        --error: #f87171;
      }
      body[data-theme="system"] .sidebar { background: #201a17; }
    }

    body {
      font-family: var(--font-body);
      background:
        radial-gradient(rgba(33, 26, 16, 0.055) 1px, transparent 1px),
        linear-gradient(180deg, var(--bg), var(--bg-alt));
      background-size: 5px 5px, auto;
      color: var(--ink);
    }

    h1, h2, h3 { font-family: var(--font-ledger); letter-spacing: 0; }
    code, pre { font-family: var(--font-mono); }

      background:
        linear-gradient(90deg, rgba(0, 0, 0, 0.18), transparent 34px),
        transparent;
    }
    .sidebar,
    body[data-theme="dark"] .sidebar {
      background: var(--sidebar);
      border-right: 2px solid var(--sidebar-line);
      color: var(--sidebar-ink);
    }
    @media (prefers-color-scheme: dark) {
      body[data-theme="system"] .sidebar { background: var(--sidebar); }
    }

      padding: 6px 6px 16px;

        </section>
      </section>

      <section id="settingsView" class="app-view" hidden>
        <div class="tab-row" id="settingsTabs"></div>
        <section class="content-band" id="settingsPanel"></section>
        <section id="setupWizard" class="setup-shell"></section>
      </section>
    </main>
  </div>
  <script>
    const escapeHtml = (value) => String(value ?? "").replace(/[&<>"']/g, (ch) => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;"
    }[ch]));
    let i18nMessages = {};
    let i18nLocale = 'ko';
    let activeView = window.localStorage.getItem('dirong.dashboard.view') ?? 'dashboard';
    let activeDbTab = normalizeDbTab(window.localStorage.getItem('dirong.dashboard.dbTab') ?? 'meeting');
    let activeSettingsTab = window.localStorage.getItem('dirong.dashboard.settingsTab') ?? 'discord';
    let activeLogFilter = window.localStorage.getItem('dirong.dashboard.logFilter') ?? 'all';
    function tr(key, params = {}) {
      const template = i18nMessages[key] ?? key;
      return String(template).replace(/\{(\w+)\}/g, (_match, name) =>
        params[name] === undefined ? '' : String(params[name])
      );
    }
    function i18n(key, params = {}) {
      return escapeHtml(tr(key, params));
    }
    function applyStaticI18n() {
      document.querySelectorAll('[data-i18n]').forEach((node) => {
        node.textContent = tr(node.getAttribute('data-i18n'));
      });
      document.title = tr('dashboard.app.title');
    }
    function setActiveView(view) {
      activeView = view;
      window.localStorage.setItem('dirong.dashboard.view', view);
      updateVisibleView();
      refresh();
    }
    function normalizeDbTab(tab) {
      if (tab === 'customFields') return 'meeting';
      return ['meeting', 'members', 'actionItems', 'customDb'].includes(tab) ? tab : 'meeting';
    }
    function setDbTab(tab) {
      const normalized = normalizeDbTab(tab);
      if (activeDbTab !== normalized) {
        notionRulesDirty = false;
        notionSchemaResult = null;
      }
      activeDbTab = normalized;
      window.localStorage.setItem('dirong.dashboard.dbTab', normalized);
      refresh();
    }
    function setSettingsTab(tab) {
      activeSettingsTab = tab;
      window.localStorage.setItem('dirong.dashboard.settingsTab', tab);
      refresh();
    }
    function setLogFilter(filter) {
      activeLogFilter = filter;
      window.localStorage.setItem('dirong.dashboard.logFilter', filter);
      refresh();
    }
    function updateVisibleView() {
      for (const view of ['dashboard', 'db', 'logs', 'settings']) {
        const node = document.getElementById(view + 'View');
        if (node) node.hidden = view !== activeView;
      }
    }
    function renderHumanDisplay(source, options = {}) {
      const display = source?.display;
      const status = source?.status ?? options.status ?? '';
      if (!display) {
        const message = options.message ?? source?.message ?? status ?? '-';
        const action = options.userAction ?? source?.userAction ?? null;
        const technical = source?.technicalDetail
          ? '<details><summary class="muted">' + i18n('dashboard.logs.details.toggle') + '</summary><pre>' + escapeHtml(source.technicalDetail) + '</pre></details>'
          : '';
        return '<div class="display-title ' + runtimeValueClass(status) + '">' + escapeHtml(message) + '</div>' +
          (action ? '<div class="display-next">' + escapeHtml(action) + '</div>' : '') + technical;
      }
      return '<div class="display-title ' + runtimeValueClass(status) + '">' + escapeHtml(display.title) + '</div>' +
        '<div class="display-desc muted">' + escapeHtml(display.description) + '</div>' +
        (display.nextAction ? '<div class="display-next">' + escapeHtml(display.nextAction) + '</div>' : '') +
        renderHumanDisplayDetails(display.details);
    }
    function renderHumanDisplayDetails(details) {
      if (!Array.isArray(details) || details.length === 0) {
        return '';
      }
      const rows = details.map((detail) =>
        '<tr><td>' + escapeHtml(detail.label) + '</td><td><pre>' +
        escapeHtml(detail.value) + '</pre></td></tr>'
      ).join('');
      return '<details><summary class="muted">' + i18n('dashboard.logs.details.toggle') + '</summary>' +
        '<table class="display-details-table"><tbody>' + rows + '</tbody></table></details>';
    }
    function displayTitle(source, fallback = '-') {
      return source?.display?.title ?? source?.message ?? fallback;
    }
    const sectionCache = new Map();
    const setupLocalState = {
      stepIndex: Number(window.localStorage.getItem('dirong.setup.stepIndex') ?? 0),
      welcomeDone: window.localStorage.getItem('dirong.setup.welcomeDone') === 'true',
      recordingDone: window.localStorage.getItem('dirong.setup.recordingDone') === 'true',
      privacyDone: window.localStorage.getItem('dirong.setup.privacyDone') === 'true',
      sttProvider: window.localStorage.getItem('dirong.setup.sttProvider') ?? 'local-whisper',
      sttModel: window.localStorage.getItem('dirong.setup.sttModel') ?? 'small',
      aiMode: window.localStorage.getItem('dirong.setup.aiMode') ?? 'cli',
      selectedGuildId: window.localStorage.getItem('dirong.setup.guildId') ?? '',
      guilds: [],
      lastResult: null,
      busy: false,
      forceRender: false
    };
    let notionRulesDirty = false;
    let notionSchemaResult = null;
    const rel = (value) => {
      if (!value) return "";
      const text = String(value).replaceAll("\\", "/");
      const idx = text.lastIndexOf("/data/");
      return idx >= 0 ? text.slice(idx + 1) : text;
    };
    const table = (headers, rows) => {
      if (!rows.length) return '<div class="muted">' + i18n('dashboard.common.none') + '</div>';
      return '<table><thead><tr>' + headers.map((h) => '<th>' + escapeHtml(h) + '</th>').join('') +
        '</tr></thead><tbody>' + rows.join('') + '</tbody></table>';
    };
    const setupStepDefinitions = [
      { id: 'language', title: '언어 선택' },
      { id: 'welcome', title: '환영/모드 선택' },
      { id: 'discord', title: 'Discord 봇 연결' },
      { id: 'guild', title: 'Discord 서버 선택' },
      { id: 'stt', title: 'STT provider/model 선택' },
      { id: 'ai', title: 'Claude CLI/API 선택' },
      { id: 'notionToken', title: 'Notion token 입력' },
      { id: 'notionParent', title: 'Notion parent page URL 입력' },
      { id: 'notionManaged', title: 'managed DB 생성' },
      { id: 'recording', title: '녹음 자동 종료 확인' },
      { id: 'privacy', title: '개인정보/보관 정책 확인' },
      { id: 'final', title: '최종 점검' }
    ];
    function renderSetupWizard(setup) {
      const root = document.getElementById('setupWizard');
      const active = document.activeElement;
      if (
        !setupLocalState.forceRender &&
        active &&
        root.contains(active) &&
        ['INPUT', 'TEXTAREA', 'SELECT'].includes(active.tagName)
      ) {
        return;
      }
      if (!setup) {
        setHtml('setupWizard', '<div class="setup-top"><div><h2 class="setup-title">첫 설정 위자드</h2>' +
          '<p class="setup-copy">설정 상태 API를 기다리는 중입니다.</p></div></div>');
        return;
      }
      setupLocalState.lastSetup = setup;
      const firstIncomplete = setupStepDefinitions.findIndex((step) => !isSetupStepReady(setup, step.id));
      const currentLimit = firstIncomplete >= 0 ? firstIncomplete : setupStepDefinitions.length - 1;
      if (!Number.isFinite(setupLocalState.stepIndex) || setupLocalState.stepIndex < 0) {
        setupLocalState.stepIndex = 0;
      }
      if (setupLocalState.stepIndex > currentLimit && !isSetupStepReady(setup, setupStepDefinitions[setupLocalState.stepIndex]?.id)) {
        setupLocalState.stepIndex = currentLimit;
        window.localStorage.setItem('dirong.setup.stepIndex', String(setupLocalState.stepIndex));
      }
      const activeStep = setupStepDefinitions[setupLocalState.stepIndex] ?? setupStepDefinitions[0];
      const progress = setupStepDefinitions.filter((step) => isSetupStepReady(setup, step.id)).length;
      const stepButtons = setupStepDefinitions.map((step, index) => {
        const ready = isSetupStepReady(setup, step.id);
        const current = index === setupLocalState.stepIndex;
        const disabled = index > currentLimit && !ready;
        const className = 'setup-step' + (current ? ' is-active' : '') + (ready ? ' is-ready' : '');
        const mark = ready ? '✓ ' : current ? '• ' : '';
        return '<button type="button" class="' + className + '"' +
          (disabled ? ' disabled' : '') + ' onclick="setSetupStep(' + index + ')">' +
          mark + escapeHtml(step.title) + '</button>';
      }).join('');
      setHtml('setupWizard',
        '<div class="setup-top"><div><h2 class="setup-title">첫 설정 위자드</h2>' +
        '<p class="setup-copy">비개발자도 token, 서버 선택, STT, Claude, Notion 생성까지 대시보드에서 끝낼 수 있게 안내합니다.</p>' +
        '</div><div class="setup-progress">' + escapeHtml(progress) + ' / ' + escapeHtml(setupStepDefinitions.length) +
        '<br>' + escapeHtml(setup.status ?? 'not_configured') + '</div></div>' +
        '<div class="setup-layout"><nav class="setup-steps">' + stepButtons + '</nav>' +
        '<div class="setup-panel">' + renderSetupStepContent(activeStep.id, setup) +
        renderSetupResult() + '</div></div>'
      );
    }
    function isSetupStepReady(setup, id) {
      if (!setup) return false;
      if (id === 'language') return setup.locale === 'ko' || setup.locale === 'en';
      if (id === 'welcome') return setupLocalState.welcomeDone;
      if (id === 'discord') {
        return Boolean(setup.features?.discord?.applicationIdConfigured && setup.secrets?.discordBot?.configured);
      }
      if (id === 'guild') return (setup.features?.discord?.guildAllowlistCount ?? 0) > 0;
      if (id === 'stt') return setup.features?.stt?.status === 'ready';
      if (id === 'ai') return setup.features?.ai?.status === 'ready';
      if (id === 'notionToken') return setup.secrets?.notion?.configured === true;
      if (id === 'notionParent') return setup.features?.notion?.parentPageConfigured === true;
      if (id === 'notionManaged') return setup.features?.notion?.managedRegistryReady === true;
      if (id === 'recording') return setupLocalState.recordingDone;
      if (id === 'privacy') return setupLocalState.privacyDone;
      if (id === 'final') {
        return setup.status === 'ready' && setupLocalState.recordingDone && setupLocalState.privacyDone;
      }
      return false;
    }
    function renderSetupStepContent(id, setup) {
      if (id === 'language') return renderSetupLanguage(setup);
      if (id === 'welcome') return renderSetupWelcome();
      if (id === 'discord') return renderSetupDiscord(setup);
      if (id === 'guild') return renderSetupGuild(setup);
      if (id === 'stt') return renderSetupStt(setup);
      if (id === 'ai') return renderSetupAi(setup);
      if (id === 'notionToken') return renderSetupNotionToken(setup);
      if (id === 'notionParent') return renderSetupNotionParent(setup);
      if (id === 'notionManaged') return renderSetupNotionManaged(setup);
      if (id === 'recording') return renderSetupRecording();
      if (id === 'privacy') return renderSetupPrivacy(setup);
      return renderSetupFinal(setup);
    }
    function renderSetupLanguage(setup) {
      const locale = setup.locale ?? 'ko';
      return '<h3>앱 언어를 선택해 주세요</h3>' +
        '<p class="setup-copy">MVP에서는 앱 언어, 위자드 언어, Notion schema locale을 같은 값으로 저장합니다.</p>' +
        '<div class="setup-cards">' +
        setupRadioCard('setupLanguage', 'ko', locale, '한국어', 'Notion managed DB 생성을 지원합니다.') +
        setupRadioCard('setupLanguage', 'en', locale, 'English', 'UI language can be saved, but managed Notion DB creation is limited to Korean in this MVP.') +
        '</div>' +
        (locale === 'en' ? '<div class="setup-notice">English를 선택하면 Notion schema locale도 en으로 저장됩니다. 단, 이번 MVP의 managed Notion DB 자동 생성은 한국어 preset만 지원하므로 생성 단계에서 한국어로 전환하라는 안내가 표시됩니다.</div>' : '') +
        '<div class="setup-actions"><button type="button" onclick="setupSaveLanguage()">언어 저장</button>' +
        setupNextButton(setup, 'language') + '</div>';
    }
    function renderSetupWelcome() {
      return '<h3>로컬 개인 모드로 시작합니다</h3>' +
        '<p class="setup-copy">Dirong은 사용자의 PC에서 Discord 녹음, STT, Claude 회의록 생성, Notion 업로드를 연결합니다. Hosted Dirong bot이나 Notion OAuth는 이번 범위에 포함하지 않습니다.</p>' +
        '<div class="setup-cards">' +
        '<label class="setup-card is-selected"><input type="radio" checked> <strong>로컬 개인 모드</strong><br><span class="muted">사용자 소유 Discord bot token과 Notion internal connection을 저장합니다.</span></label>' +
        '<label class="setup-card"><input type="radio" disabled> <strong>Hosted mode</strong><br><span class="muted">후속 제품 결정 뒤 지원합니다.</span></label>' +
        '</div><div class="setup-actions"><button type="button" onclick="setupAcknowledge(&quot;welcomeDone&quot;)">계속</button></div>';
    }
    function renderSetupDiscord(setup) {
      const inviteUrl = setup.wizard?.inviteUrl ?? setupLocalState.lastResult?.inviteUrl ?? '';
      return '<h3>Discord 봇을 연결합니다</h3>' +
        '<p class="setup-copy">Discord Developer Portal에서 만든 application ID와 bot token을 저장합니다. Token은 저장 후 다시 표시하지 않습니다.</p>' +
        '<div class="setup-form">' +
        '<label>Discord application ID<input id="setupDiscordApplicationId" type="text" inputmode="numeric" autocomplete="off" placeholder="숫자 application ID"></label>' +
        '<div class="setup-actions"><button type="button" onclick="setupSaveDiscordApplicationId()">애플리케이션 ID 저장</button></div>' +
        (inviteUrl ? '<div class="setup-result setup-ok"><div class="label">초대 링크</div><a href="' + escapeHtml(inviteUrl) + '" target="_blank" rel="noreferrer">Discord 서버에 Dirong 봇 추가</a></div>' : '') +
        '<label>Discord bot token<input id="setupDiscordBotToken" type="password" autocomplete="off" placeholder="저장 후 화면에 다시 표시되지 않습니다"></label>' +
        '<div class="setup-actions"><button type="button" onclick="setupSaveDiscordBotToken()">bot token 저장</button>' +
        '<button type="button" onclick="setupTestDiscord()">연결 확인</button>' + setupNextButton(setup, 'discord') + '</div>' +
        '</div>';
    }
    function renderSetupGuild(setup) {
      const guilds = setupLocalState.guilds ?? [];
      const list = guilds.length
        ? '<div class="setup-guild-list">' + guilds.map((guild) =>
            '<label class="setup-guild"><input type="radio" name="setupGuild" value="' + escapeHtml(guild.id) + '"' +
            (setupLocalState.selectedGuildId === guild.id ? ' checked' : '') +
            ' onchange="setupRememberGuild(this.value)"> <strong>' + escapeHtml(guild.name) + '</strong></label>'
          ).join('') + '</div>'
        : '<div class="muted">아직 서버 목록을 불러오지 않았습니다.</div>';
      return '<h3>녹음을 허용할 Discord 서버를 선택합니다</h3>' +
        '<p class="setup-copy">봇이 들어간 서버 이름만 보여줍니다. 서버 ID는 직접 입력하지 않습니다.</p>' +
        '<div class="setup-actions"><button type="button" onclick="setupLoadGuilds()">서버 목록 불러오기</button></div>' +
        list +
        '<div class="setup-actions"><button type="button" onclick="setupSaveGuild()">선택한 서버 저장</button>' +
        setupNextButton(setup, 'guild') + '</div>';
    }
    function renderSetupStt(setup) {
      const provider = setupLocalState.sttProvider;
      const model = setupLocalState.sttModel;
      return '<h3>STT provider와 모델을 선택합니다</h3>' +
        '<p class="setup-copy">기본 추천은 내 PC에서 처리하는 local faster-whisper입니다. OpenAI STT는 API 발급이 필요한 유료 고급 대안입니다.</p>' +
        '<div class="setup-cards">' +
        setupRadioCard('setupSttProvider', 'local-whisper', provider, '추천: local faster-whisper', '무료이며 음성이 외부 STT API로 전송되지 않습니다.', 'setupRememberSttProvider') +
        setupRadioCard('setupSttProvider', 'openai', provider, '고급: OpenAI STT 사용 (API 발급 필요 - 유료)', '처리는 쉬울 수 있지만 API 비용이 발생하고 음성이 OpenAI로 전송됩니다.', 'setupRememberSttProvider') +
        '</div>' +
        (provider === 'local-whisper'
          ? '<div class="setup-cards">' +
            setupRadioCard('setupSttModel', 'small', model, '추천: 빠름', 'small / cpu / int8. 대부분의 PC에 먼저 권장합니다.', 'setupRememberSttModel') +
            setupRadioCard('setupSttModel', 'medium', model, '정확도 우선', 'medium / cpu / int8. 더 느릴 수 있지만 한국어 회의 품질이 좋아질 수 있습니다.', 'setupRememberSttModel') +
            '</div>'
          : '<div class="setup-form"><label>OpenAI API key<input id="setupOpenAiApiKey" type="password" autocomplete="off" placeholder="API 발급 필요 - 유료"></label></div>') +
        '<div class="setup-actions"><button type="button" onclick="setupSaveStt()">STT 설정 저장</button>' +
        setupNextButton(setup, 'stt') + '</div>';
    }
    function renderSetupAi(setup) {
      const mode = setupLocalState.aiMode;
      return '<h3>Claude 사용 방식을 선택합니다</h3>' +
        '<p class="setup-copy">MVP에서는 Claude만 실제 지원합니다. CLI 또는 API 중 하나를 선택합니다.</p>' +
        '<div class="setup-cards">' +
        setupRadioCard('setupAiMode', 'cli', mode, 'Claude CLI 사용', '로컬 Claude command를 실행해 회의록을 만듭니다.', 'setupRememberAiMode') +
        setupRadioCard('setupAiMode', 'api', mode, 'Claude API 사용', 'API key를 저장해 회의록을 만듭니다.', 'setupRememberAiMode') +
        '</div>' +
        '<div class="setup-form">' +
        (mode === 'cli'
          ? '<label>CLI command<input id="setupClaudeCommand" type="text" value="claude" autocomplete="off"></label>'
          : '<label>Claude API key<input id="setupClaudeApiKey" type="password" autocomplete="off" placeholder="저장 후 화면에 다시 표시되지 않습니다"></label>') +
        '<label>Model (선택)<input id="setupClaudeModel" type="text" autocomplete="off" placeholder="비워 두면 기본값을 사용합니다"></label>' +
        '</div><div class="setup-actions"><button type="button" onclick="setupSaveClaude()">Claude 설정 저장</button>' +
        '<button type="button" onclick="setupTestClaude()">연결 확인</button>' + setupNextButton(setup, 'ai') + '</div>';
    }
    function renderSetupNotionToken(setup) {
      return '<h3>Notion internal connection token을 입력합니다</h3>' +
        '<p class="setup-copy">Notion 내부 연결 설정에서 token을 복사해 붙여넣습니다. Token은 local secret file에 저장되고 원문은 다시 표시하지 않습니다.</p>' +
        '<div class="setup-form"><label>Notion token<input id="setupNotionToken" type="password" autocomplete="off" placeholder="secret_ 또는 ntn_ token"></label></div>' +
        '<div class="setup-actions"><button type="button" onclick="setupSaveNotionToken()">Notion token 저장</button>' +
        setupNextButton(setup, 'notionToken') + '</div>';
    }
    function renderSetupNotionParent(setup) {
      return '<h3>Dirong 전용 Notion parent page URL을 입력합니다</h3>' +
        '<p class="setup-copy">데이터베이스 링크가 아니라, 회의록 표를 만들 상위 page 링크를 붙여넣습니다. 이 page에 Dirong internal connection을 Add connection으로 공유해 주세요.</p>' +
        '<div class="setup-form"><label>Parent page URL<input id="setupNotionParentPageUrl" type="url" autocomplete="off" placeholder="https://www.notion.so/..."></label></div>' +
        '<div class="setup-actions"><button type="button" onclick="setupSaveNotionParent()">parent page URL 저장</button>' +
        '<button type="button" onclick="setupVerifyNotionParent()">접근 확인</button>' + setupNextButton(setup, 'notionParent') + '</div>';
    }
    function renderSetupNotionManaged(setup) {
      const locale = setup.locale ?? 'ko';
      const unsupported = locale !== 'ko';
      const notice = unsupported
        ? '<div class="setup-notice">현재 앱 언어와 Notion schema locale은 ' + escapeHtml(locale) + '입니다. MVP managed Notion DB 자동 생성은 한국어 preset만 지원하므로, 생성하려면 언어 선택 단계에서 한국어로 바꿔 주세요.</div>'
        : '<div class="setup-notice setup-ok">이 버튼은 parent page 아래에 회의록, 작업자, 액션 아이템 DB를 만들고 registry에 내부 mapping을 저장합니다.</div>';
      return '<h3>Notion managed DB 세트를 생성합니다</h3>' +
        '<p class="setup-copy">사용자는 database id, data source id, property id를 입력하지 않습니다. Dirong이 생성 결과를 registry에 저장합니다.</p>' +
        notice +
        '<div class="setup-actions"><button type="button"' + (unsupported ? ' disabled' : '') + ' onclick="setupCreateManagedDatabases()">managed DB 생성</button>' +
        setupNextButton(setup, 'notionManaged') + '</div>' +
        renderManagedRegistryDetails(setup.features?.notion?.managedRegistry, { compact: true }) +
        renderCreatedNotionDatabases();
    }
    function renderSetupRecording() {
      return '<h3>녹음 자동 종료를 확인합니다</h3>' +
        '<p class="setup-copy">추천 기본값은 켜짐입니다. 음성 채널에 사람이 모두 나가고 Dirong 봇만 남으면 90초 뒤 녹음을 종료합니다.</p>' +
        '<label class="setup-guild"><input id="setupRecordingConfirm" type="checkbox"' + (setupLocalState.recordingDone ? ' checked' : '') + '> 자동 종료 기본값을 확인했습니다.</label>' +
        '<div class="setup-actions"><button type="button" onclick="setupConfirmRecording()">계속</button></div>';
    }
    function renderSetupPrivacy(setup) {
      const retention = setup.features?.dataRetention;
      return '<h3>개인정보와 보관 정책을 확인합니다</h3>' +

    async function setupPost(path, body) {
      setupLocalState.busy = true;
      try {
        const res = await fetch(path, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body ?? {})
        });
        const result = await res.json();
        setupLocalState.lastResult = result;
        if (Array.isArray(result.guilds)) {
          setupLocalState.guilds = result.guilds;
        }
        setupLocalState.forceRender = true;
        await refresh();
        setupLocalState.forceRender = false;
        return result;
      } catch (error) {
        const message = error instanceof Error ? error.message : String(error);
        setupLocalState.lastResult = { ok: false, status: 'failed', message, userAction: '잠시 후 다시 시도해 주세요.' };
        setupLocalState.forceRender = true;
        renderSetupWizard(setupLocalState.lastSetup);
        setupLocalState.forceRender = false;
        return setupLocalState.lastResult;
      } finally {
        setupLocalState.busy = false;
      }
    }

    async function refresh() {
      try {
        const [res, setupRes, i18nRes] = await Promise.all([
          fetch('/api/state', { cache: 'no-store' }),
          fetch('/api/setup/state', { cache: 'no-store' }),
          fetch('/api/i18n', { cache: 'no-store' })
        ]);
        if (!res.ok) {
          throw new Error('HTTP ' + res.status);
        }
        if (i18nRes.ok) {
          const i18n = await i18nRes.json();
          i18nLocale = i18n.locale ?? 'ko';
          i18nMessages = i18n.messages ?? {};
          document.documentElement.lang = i18nLocale;
          applyStaticI18n();
        }
        const state = await res.json();
        const setup = setupRes.ok ? await setupRes.json() : state.setup ?? null;
        renderState(state, setup);
      } catch (error) {
        const message = error instanceof Error ? error.message : String(error);
        setHtml('events', '<div class="metric"><div class="label">dashboard fetch failed</div>' +
          '<div class="value error">' + escapeHtml(message) + '</div></div>');
        setHtml('setupWizard', '<div class="setup-top"><div><h2 class="setup-title">첫 설정 위자드</h2>' +
          '<p class="setup-copy">설정 상태를 불러오지 못했습니다.</p></div></div>' +
          '<div class="setup-result"><div class="value error">' + escapeHtml(message) + '</div></div>');
      }
    }
    function renderState(state, setup) {
      const setupSnapshot = setup ?? state.setup ?? null;
      const runtime = state.runtime ?? {};
      const theme = setupSnapshot?.dashboardTheme ?? 'system';
      document.body.dataset.theme = theme;
      document.getElementById('generatedAt').textContent =
        tr('dashboard.app.generatedAt') + ': ' + (state.generatedAt ?? '-');
      document.getElementById('viewTitle').textContent = titleForView(activeView);
      document.getElementById('audioTitle').textContent = tr('dashboard.audio.title');
      document.getElementById('notesTitle').textContent = tr('dashboard.notes.title');
      document.getElementById('needsAttentionTitle').textContent = tr('dashboard.logs.needsAttention.title');
      document.getElementById('timelineTitle').textContent = tr('dashboard.logs.timeline.title');
      document.getElementById('sttQueueTitle').textContent = tr('dashboard.logs.sttQueue.title');
      document.getElementById('aiCleanupTitle').textContent = tr('dashboard.logs.aiCleanup.title');

      renderSetupWizard(setupSnapshot);
      renderSidebar(state, setupSnapshot);
      renderSetupIncompleteBanner(setupSnapshot);
      setHtml('statusChips', renderStatusChips(state, setupSnapshot));
      setHtml('lockedCards', renderLockedCards(setupSnapshot));
      setHtml('pipeline', renderPhaseFlowCards(state));
      setHtml('metrics', renderAudioSummary(state));
      setHtml('chunks', renderAudioRows(state));
      setHtml('transcripts', renderTranscriptRows(state));
      setHtml('draftPreview', renderDraftPreview(state));
      setHtml('dbTabs', renderTabs([
        ['meeting', 'dashboard.db.tabs.meeting'],
        ['members', 'dashboard.db.tabs.members'],
        ['actionItems', 'dashboard.db.tabs.actionItems'],
        ['customDb', 'dashboard.db.tabs.customDb']
      ], activeDbTab, 'setDbTab'));
      setHtml('settingsTabs', renderTabs([
        ['discord', 'dashboard.settings.tabs.discord'],
        ['stt', 'dashboard.settings.tabs.stt'],
        ['ai', 'dashboard.settings.tabs.ai'],
        ['notion', 'dashboard.settings.tabs.notion'],
        ['retention', 'dashboard.settings.tabs.retention'],
        ['aloneFinalize', 'dashboard.settings.tabs.aloneFinalize'],
        ['reset', 'dashboard.settings.tabs.reset']
      ], activeSettingsTab, 'setSettingsTab'));
      setHtml('logFilters', renderTabs([
        ['all', 'dashboard.logs.filters.all'],
        ['needsAttention', 'dashboard.logs.filters.needsAttention'],
        ['recording', 'dashboard.logs.filters.recording'],
        ['stt', 'dashboard.logs.filters.stt'],
        ['ai', 'dashboard.logs.filters.ai'],
        ['notion', 'dashboard.logs.filters.notion'],
        ['system', 'dashboard.logs.filters.system']
      ], activeLogFilter, 'setLogFilter'));
      const activeRole = activeDatabaseRole();
      setHtml('notion', renderDbPanel(state, setupSnapshot, activeRole));
      if (!notionRulesDirty) {
        setHtml('notionProperties', renderDbCustomFieldsSection(state, activeRole));
      }
      setHtml('settingsPanel', renderSettingsPanel(state, setupSnapshot));
      setHtml('events', renderEventTimeline(state));
      setHtml('repairs', renderNeedsAttention(state));
      setHtml('sttJobs', renderSttJobTable(state));
      setHtml('aiCleanup', renderAiCleanupTable(state));
      setLogSectionVisibility();
      updateVisibleView();
    }
    function titleForView(view) {
      if (view === 'db') return tr('dashboard.nav.databaseSettings');
      if (view === 'logs') return tr('dashboard.nav.logs');
      if (view === 'settings') return tr('dashboard.nav.settings');
      return tr('dashboard.nav.dashboard');

        '<button type="button" class="server-button">' +

        '<button type="button" class="server-button" onclick="setActiveView(\'settings\');setSettingsTab(\'discord\')">' +

      );

        ['dashboard', 'dashboard.nav.dashboard'],
        ['db', 'dashboard.nav.databaseSettings'],
        ['logs', 'dashboard.nav.logs'],
        ['settings', 'dashboard.nav.settings']
      ].map(([view, key]) => '<button type="button" class="nav-button' +

        '<span>' + i18n(key) + '</span></button>').join('');
      setHtml('sectionNav', nav);

        '<button type="button" class="nav-button" title="/dirong start는 Discord에서 실행합니다" disabled>' +
        '<span>' + i18n('dashboard.quick.startRecording') + '</span></button>' +
        '<button type="button" class="nav-button" onclick="refresh()"><span>' +
        i18n('dashboard.quick.refreshStatus') + '</span></button>'
      );
    }
    function renderSetupIncompleteBanner(setup) {
      const root = document.getElementById('setupIncompleteBanner');
      if (!setup || setup.status === 'ready') {
        root.classList.remove('is-visible');
        root.innerHTML = '';
        return;
      }
      root.classList.add('is-visible');
      root.innerHTML =
        '<div><strong>' + i18n('dashboard.setupIncomplete.banner.title') + '</strong> ' +
        '<span>' + i18n('dashboard.setupIncomplete.banner.description') + '</span></div>' +
        '<button type="button" onclick="setActiveView(\'settings\')">' +
        i18n('dashboard.setupIncomplete.banner.action') + '</button>';
    }
    function renderStatusChips(state, setup) {
      const chips = [
        ['recording', 'dashboard.status.recording.label', state.runtime?.isRecording ? 'recording' : setup?.features?.recording?.status],
        ['stt', 'dashboard.status.stt.label', setup?.features?.stt?.status ?? state.sttAutomation?.status],
        ['ai', 'dashboard.status.ai.label', setup?.features?.ai?.status ?? state.aiReadiness?.status],
        ['notion', 'dashboard.status.notion.label', setup?.features?.notion?.status ?? state.notion?.status]
      ];
      return chips.map(([_id, labelKey, status]) =>
        '<span class="status-chip ' + statusTone(status) + '"><span class="status-dot"></span>' +
        '<span>' + i18n(labelKey) + '</span><strong>' + escapeHtml(statusLabel(status)) +
        '</strong></span>'
      ).join('');
    }
    function renderLockedCards(setup) {
      const features = setup?.features;
      if (!features || setup.status === 'ready') return '';
      const entries = [
        ['Discord', features.discord],
        ['STT', features.stt],
        ['AI', features.ai],
        ['Notion', features.notion],
        ['Recording', features.recording]
      ].filter(([, feature]) => feature?.status !== 'ready');
      if (entries.length === 0) return '';
      return '<div class="section-heading"><h2>' + i18n('dashboard.setupIncomplete.lockedTitle') + '</h2></div>' +
        '<div class="locked-grid">' + entries.map(([label, feature]) =>
          '<div class="locked-card"><div class="label">' + escapeHtml(label) + ' · ' +
          escapeHtml(statusLabel(feature?.status)) + '</div>' + renderHumanDisplay(feature) + '</div>'
        ).join('') + '</div>';
    }
    function renderPhaseFlowCards(state) {
      return [
        renderParticipantFlowCard(state),
        renderRecordingFlowCard(state),
        renderAiFlowCard(state),
        renderNotionFlowCard(state)
      ].join('');
    }
    function renderParticipantFlowCard(state) {
      const speakers = state.speakers ?? [];
      const humans = speakers.filter((s) => !s.is_bot);
      const status = humans.length > 0 ? 'ready' : 'idle';
      return flowCard('dashboard.card.participants.title', status,
        humans.length > 0
          ? humans.slice(0, 4).map((s) => escapeHtml(s.display_name_snapshot)).join('<br>')
          : i18n('dashboard.card.participants.empty')
      );
    }
    function renderRecordingFlowCard(state) {
      const runtime = state.runtime ?? {};
      const sttCounts = countStatuses(state.recentSttJobs ?? []);
      const failed = (sttCounts.get('failed') ?? 0) + (sttCounts.get('failed_missing_file') ?? 0);
      const status = runtime.isRecording ? 'processing' : state.currentSession ? 'ready' : 'idle';
      const message = runtime.isRecording
        ? tr('dashboard.card.recording.active')
        : state.currentSession
          ? tr('dashboard.card.recording.ended')
          : tr('dashboard.card.recording.idle');
      return flowCard('dashboard.card.recording.title', status,
        escapeHtml(message) + '<br>' +
        i18n('dashboard.card.recording.audioFiles', { count: (state.recentChunks ?? []).length }) + '<br>' +
        renderSttSummaryBoxes(sttCounts.get('done') ?? 0, failed)
      );
    }
    function renderAiFlowCard(state) {
      const latestAiJob = (state.recentAiCleanupJobs ?? [])[0];
      const draft = state.latestMeetingNotesDraft;
      const status = draft ? 'ready' :
        ['processing', 'queued'].includes(String(latestAiJob?.status)) ? 'processing' :
        ['failed', 'blocked'].includes(String(latestAiJob?.status)) ? 'failed' : 'idle';
      const key = draft ? 'dashboard.card.aiNotes.done' :
        status === 'processing' ? 'dashboard.card.aiNotes.processing' :
        status === 'failed' ? 'dashboard.card.aiNotes.failed' :
        'dashboard.card.aiNotes.waiting';
      const detail = latestAiJob
        ? '<div class="muted">' + escapeHtml(latestAiJob.status) + ' / ' + escapeHtml(latestAiJob.provider) + '</div>'
        : '';
      return flowCard('dashboard.card.aiNotes.title', status, i18n(key) + detail);
    }
    function renderNotionFlowCard(state) {
      const latest = state.latestNotionWrite;
      const status = latest?.status === 'done' ? 'ready' :
        ['processing', 'queued', 'retry_wait'].includes(String(state.notionAutomation?.status ?? latest?.status)) ? 'processing' :
        ['failed', 'blocked'].includes(String(latest?.status ?? state.notion?.status)) ? 'failed' : 'idle';
      const key = status === 'ready' ? 'dashboard.card.notionUpload.done' :
        status === 'processing' ? 'dashboard.card.notionUpload.processing' :
        status === 'failed' ? 'dashboard.card.notionUpload.failed' :
        'dashboard.card.notionUpload.waiting';
      const link = latest?.notion_page_url
        ? '<div><a href="' + escapeHtml(latest.notion_page_url) + '" target="_blank" rel="noreferrer">' +
          i18n('dashboard.common.openNotion') + '</a></div>'
        : '';
      return flowCard('dashboard.card.notionUpload.title', status, i18n(key) + link);
    }
    function flowCard(titleKey, status, body) {
      return '<article class="flow-card ' + statusTone(status) + '"><div class="flow-card-header"><h3>' + i18n(titleKey) +
        '</h3><span class="card-state ' + cardStateClass(status) + '"></span></div>' +
        '<div class="value ' + runtimeValueClass(status) + '">' + body + '</div></article>';
    }
    function renderAudioSummary(state) {
      const speakers = (state.speakers ?? []).filter((s) => !s.is_bot);
      const sttCounts = countStatuses(state.recentSttJobs ?? []);
      const failed = (sttCounts.get('failed') ?? 0) + (sttCounts.get('failed_missing_file') ?? 0);
      return '<div class="summary-list">' +
        speakers.map((s) => '<span class="summary-pill">' +
          i18n('dashboard.audio.summary.speakerUtterances', { name: s.display_name_snapshot, count: s.chunk_count ?? 0 }) +
          '</span>').join('') +
        '<span class="summary-pill summary-pill-stt tone-ready">' + i18n('dashboard.audio.summary.sttDone', { count: sttCounts.get('done') ?? 0 }) + '</span>' +
        '<span class="summary-pill summary-pill-stt tone-danger">' + i18n('dashboard.audio.summary.sttFailed', { count: failed }) + '</span></div>';
    }
    function renderSttSummaryBoxes(done, failed) {
      return '<span class="stt-summary-list">' +
        '<span class="stt-summary-box tone-ready">' + i18n('dashboard.audio.summary.sttDone', { count: done }) + '</span>' +
        '<span class="stt-summary-box tone-danger">' + i18n('dashboard.audio.summary.sttFailed', { count: failed }) + '</span></span>';
    }
    function renderAudioRows(state) {
      const rows = (state.recentChunks ?? []).map((c) => '<tr><td>' +
        escapeHtml(formatMs(c.started_at_ms ?? c.startedAtMs ?? 0)) + '</td><td>' +
        escapeHtml(c.display_name_snapshot) + '</td><td>' +
        escapeHtml(c.status) + ' / ' + escapeHtml(c.transcode_status) + '</td><td>' +

        message = '회의록 생성 중';

        status = 'queued';
        message = 'AI cleanup job 대기 중';

        message = latestAiJob.status === 'blocked' ? '회의록 생성 보류' : '회의록 생성 실패';
      } else if (queuedOrProcessingStt > 0) {
        status = 'stt';
        message = 'STT 처리 중';
      } else if (session.status === 'finalized') {
        status = 'waiting_ai';
        message = failedStt > 0 ? 'STT 확인 필요' : 'AI cleanup 대기 중';

      const aiJob = latestAiJob

    function deleteNotionRuleRow(button) {

        });

    function renderNotionSchemaResult(result) {
      if (!result) {
        return '';

      const diff = result.diff;

        ? '<div class="warn">' + result.warnings.map(escapeHtml).join('<br>') + '</div>'
        : '';
      if (!diff) {
        return '<div style="margin-top:10px"><div class="value ' + runtimeValueClass(result.status) + '">' +
          escapeHtml(actionStatusText(result)) + '</div>' + warnings + '</div>';
      }
      const rows = []
        .concat((diff.missing ?? []).map((item) => schemaRow(
          tr('dashboard.db.customFields.schemaResult.categories.missing'),
          item.propertyName,
          propertyTypeLabel(item.propertyType),
          tr('dashboard.db.customFields.schemaResult.handling.autoPossible')
        )))
        .concat((diff.renames ?? []).map((item) => schemaRow(
          tr('dashboard.db.customFields.schemaResult.categories.rename'),
          item.fromName + ' -> ' + item.toName,
          propertyTypeLabel(item.propertyType),
          tr('dashboard.db.customFields.schemaResult.handling.autoPossible')
        )))
        .concat((diff.wrongType ?? []).map((item) => schemaRow(
          tr('dashboard.db.customFields.schemaResult.categories.wrongType'),
          item.propertyName,
          propertyTypeLabel(item.actualType) + ' -> ' + propertyTypeLabel(item.expectedType),
          item.canUpdate ? tr('dashboard.db.customFields.schemaResult.handling.autoPossible') : tr('dashboard.db.customFields.schemaResult.handling.manualNeeded')
        )))
        .concat((diff.missingOptions ?? []).map((item) => schemaRow(
          tr('dashboard.db.customFields.schemaResult.categories.missingOptions'),
          item.propertyName,
          item.missingOptions.join(', '),
          item.canUpdate ? tr('dashboard.db.customFields.schemaResult.handling.autoPossible') : tr('dashboard.db.customFields.schemaResult.handling.manualNeeded')
        )))
        .concat((diff.extra ?? []).map((item) => schemaRow(
          tr('dashboard.db.customFields.schemaResult.categories.extra'),
          item.propertyName,
          propertyTypeLabel(item.propertyType),
          tr('dashboard.db.customFields.schemaResult.handling.preserved')
        )));
      const detail = rows.length
        ? table([
            tr('dashboard.table.summary'),
            tr('dashboard.db.customFields.columns.property'),
            tr('dashboard.db.customFields.columns.type'),
            tr('dashboard.table.nextAction')
          ], rows)
        : '<div class="muted">' + i18n('dashboard.db.customFields.schemaResult.ok') + '</div>';
      return '<div style="margin-top:10px">' +
        '<div class="label">' + i18n('dashboard.db.customFields.schemaResult.title') + ' · ' +
        escapeHtml(statusLabel(result.status)) + '</div>' +
        '<div class="value ' + runtimeValueClass(result.status) + '">' + escapeHtml(result.message) + '</div>' +
        (result.userAction ? '<div class="muted">' + escapeHtml(result.userAction) + '</div>' : '') +
        warnings + detail + '</div>';
    }
    function schemaRow(kind, property, type, handling) {

    async function saveNotionPropertyRules(options = {}) {

        promptDescription: row.querySelector('[data-field="promptDescription"]')?.value ?? '',
        maxLength: Number(row.querySelector('[data-field="maxLength"]')?.value ?? 1000),
        relationTargetUrl: row.querySelector('[data-field="relationTargetUrl"]')?.value ?? '',
        relationDataSourceId: row.querySelector('[data-field="relationDataSourceId"]')?.value ?? '',
        relationTargetPageUrl: row.querySelector('[data-field="relationTargetPageUrl"]')?.value ?? '',
        relationTargetPageId: row.querySelector('[data-field="relationTargetPageId"]')?.value ?? '',
        relationMatchPropertyName: row.querySelector('[data-field="relationMatchPropertyName"]')?.value ?? 'Name',
        relationAutoCreate: row.querySelector('[data-field="relationAutoCreate"]')?.checked === true,
        deleted: row.getAttribute('data-deleted') === 'true'
      }));
      try {
        const res = await fetch('/api/notion/properties', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ targetDatabaseRole, rules })
        });
        const result = await res.json();
        notionRulesDirty = false;
        if (statusEl) statusEl.textContent = actionStatusText(result);
        if (options.refresh !== false) {
          refresh();
        }
        return result;
      } catch (error) {
        const message = error instanceof Error ? error.message : String(error);
        if (statusEl) statusEl.textContent = message;
        throw error;
      }
    }
    async function inspectNotionSchema() {
      const statusEl = document.getElementById('notionPropertyStatus');
      if (statusEl) statusEl.textContent = tr('dashboard.db.customFields.status.checking');
      try {
        if (notionRulesDirty) {
          await saveNotionPropertyRules({ refresh: false });
        }
        const res = await fetch('/api/notion/schema/inspect', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: '{}'
        });
        notionSchemaResult = await res.json();
        if (statusEl) statusEl.textContent = actionStatusText(notionSchemaResult);
        notionRulesDirty = false;
        refresh();
      } catch (error) {
        const message = error instanceof Error ? error.message : String(error);
        if (statusEl) statusEl.textContent = message;
      }
    }
    async function applyNotionSchema() {
      const statusEl = document.getElementById('notionPropertyStatus');
      if (statusEl) statusEl.textContent = tr('dashboard.db.customFields.status.applying');
      try {
        if (notionRulesDirty) {
          await saveNotionPropertyRules({ refresh: false });
        }
        const body = {
          createMissing: true,
          updateTypes: document.getElementById('notionSchemaUpdateTypes')?.checked === true,
          deleteExtra: false,
          confirmDeleteExtra: false
        };
        const res = await fetch('/api/notion/schema/apply', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        notionSchemaResult = await res.json();
        if (statusEl) statusEl.textContent = actionStatusText(notionSchemaResult);
        notionRulesDirty = false;
        refresh();
      } catch (error) {
        const message = error instanceof Error ? error.message : String(error);
        if (statusEl) statusEl.textContent = message;
      }
    }
    async function postNotionAction(action) {
      const statusEl = document.getElementById('notionActionStatus');
      if (statusEl) statusEl.textContent = 'running...';
      try {
        const stateRes = await fetch('/api/state', { cache: 'no-store' });
        const state = await stateRes.json();
        const body = {
          draftId: state.latestMeetingNotesDraft?.id ?? null,
          sessionId: state.currentSession?.id ?? null
        };
        const res = await fetch('/api/notion/' + action, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const result = await res.json();
        if (statusEl) statusEl.textContent = result.status + ': ' + result.message;
        refresh();
      } catch (error) {
        const message = error instanceof Error ? error.message : String(error);
        if (statusEl) statusEl.textContent = message;
      }
    }
    function renderAloneFinalize(aloneFinalize) {
      if (!aloneFinalize) {
        return '';
      }
      const countdown = aloneFinalize.status === 'countdown' && aloneFinalize.remainingMs !== null
        ? '<div class="muted">' + i18n('dashboard.settings.aloneFinalize.countdown', {
            seconds: Math.ceil(aloneFinalize.remainingMs / 1000)
          }) + '</div>'
        : '';
      const warnings = aloneFinalize.warnings?.length
        ? '<div class="warn">' + aloneFinalize.warnings.map(escapeHtml).join(', ') + '</div>'
        : '';
      return '<div class="metric" style="margin-bottom:10px">' +
        '<div class="label">' + i18n('dashboard.settings.aloneFinalize.title') + ' · ' +
        escapeHtml(statusLabel(aloneFinalize.status)) + ' · ' +
        i18n('dashboard.settings.aloneFinalize.checkedAt') + ': ' +
        escapeHtml(aloneFinalize.checkedAt ?? tr('dashboard.settings.aloneFinalize.notChecked')) +
        '</div>' + renderHumanDisplay(aloneFinalize) +
        countdown + warnings + '</div>';
    }
    function renderAudioControls(c) {
      if (!(c.raw_byte_size > 0) || c.status === 'writing') {
        return '<span class="muted">' + i18n('dashboard.audio.playback.pending') + '</span>';
      }
      const encoded = encodeURIComponent(c.id);
      const stt = c.stt_audio_path && c.stt_byte_size > 0
        ? '<div class="label">' + i18n('dashboard.audio.playback.sttSafe') + '</div><audio controls preload="metadata" src="/audio/' + encoded + '/stt"></audio>'
        : '';
      return stt + '<div class="label">' + i18n('dashboard.audio.playback.raw') + '</div><audio controls preload="metadata" src="/audio/' + encoded + '/raw"></audio>';
    }
    function shortHash(value) {
      if (!value) return '';
      return String(value).slice(0, 12);
    }
    function queueSummary(rows) {
      const counts = new Map(rows.map((row) => [row.status, row.count]));
      return ['queued', 'processing', 'done', 'failed', 'failed_missing_file']
        .map((status) => status + ':' + (counts.get(status) ?? 0))
        .join(' / ');
    }
    function countStatuses(rows) {
      const counts = new Map();
      for (const row of rows) {
        counts.set(row.status, (counts.get(row.status) ?? 0) + 1);
      }
      return counts;
    }
    function runtimeValueClass(status) {
      if (['failed', 'blocked', 'not_installed', 'failed_missing_file'].includes(String(status))) {
        return 'error';
      }
      if ([
        'running',
        'queued',
        'processing',
        'partial',
        'countdown',
        'checking',
        'waiting_for_stt',
        'waiting_for_ai_provider',
        'waiting_ai',
        'stt',
      ].includes(String(status))) {
        return 'warn';
      }
      return 'status';
    }
    refresh();
    setInterval(refresh, 3000);
  </script>
</body>
</html>
