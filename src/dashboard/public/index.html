<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dirong Recording + STT Dashboard</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f7f4;
      --panel: #ffffff;
      --ink: #1f2328;
      --muted: #646b75;
      --line: #d9dfe7;
      --accent: #0f766e;
      --warn: #a15c00;
      --error: #b42318;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, "Malgun Gothic", sans-serif;
      background: var(--bg);
      color: var(--ink);
      letter-spacing: 0;
    }
    header {
      padding: 18px 24px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }
    h1 { margin: 0; font-size: 22px; }
    main { max-width: 1240px; margin: 0 auto; padding: 20px; }
    section { margin: 0 0 22px; }
    h2 { font-size: 16px; margin: 0 0 10px; }
    .grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; }
    .pipeline-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; }
    .metric {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      min-height: 74px;
    }
    .label { color: var(--muted); font-size: 12px; margin-bottom: 8px; }
    .value { font-size: 15px; overflow-wrap: anywhere; }
    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }
    th, td {
      padding: 8px 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
      font-size: 13px;
      overflow-wrap: anywhere;
    }
    th { color: var(--muted); font-weight: 600; background: #fbfbf9; }
    tr:last-child td { border-bottom: 0; }
    code { font-family: Consolas, monospace; font-size: 12px; }
    pre {
      margin: 0;
      padding: 12px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      max-height: 360px;
      overflow: auto;
      font-family: Consolas, "Malgun Gothic", monospace;
      font-size: 13px;
    }
    audio { width: 220px; max-width: 100%; height: 32px; }
    .status { color: var(--accent); font-weight: 700; }
    .warn { color: var(--warn); }
    .error { color: var(--error); }
    .muted { color: var(--muted); }
    @media (max-width: 860px) {
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .pipeline-grid { grid-template-columns: repeat(1, minmax(0, 1fr)); }
      main { padding: 14px; }
      th, td { font-size: 12px; padding: 7px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Dirong Recording + STT Dashboard</h1>
    <div class="muted" id="generatedAt">loading</div>
  </header>
  <main>
    <section class="grid" id="metrics"></section>
    <section>
      <h2>Pipeline Runtime</h2>
      <div class="pipeline-grid" id="pipeline"></div>
    </section>
    <section>
      <h2>Speakers</h2>
      <div id="speakers"></div>
    </section>
    <section>
      <h2>Recent Chunks</h2>
      <div id="chunks"></div>
    </section>
    <section>
      <h2>STT Queue</h2>
      <div id="sttJobs"></div>
    </section>
    <section>
      <h2>Transcript Segments</h2>
      <div id="transcripts"></div>
    </section>
    <section>
      <h2>AI Cleanup</h2>
      <div id="aiCleanup"></div>
    </section>
    <section>
      <h2>Latest Draft Preview</h2>
      <div id="draftPreview"></div>
    </section>
    <section>
      <h2>Notion Upload</h2>
      <div id="notion"></div>
    </section>
    <section>
      <h2>Connection / Errors</h2>
      <div id="events"></div>
    </section>
    <section>
      <h2>Repair Items</h2>
      <div id="repairs"></div>
    </section>
  </main>
  <script>
    const escapeHtml = (value) => String(value ?? "").replace(/[&<>"']/g, (ch) => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;"
    }[ch]));
    const sectionCache = new Map();
    const rel = (value) => {
      if (!value) return "";
      const text = String(value).replaceAll("\\", "/");
      const idx = text.lastIndexOf("/data/");
      return idx >= 0 ? text.slice(idx + 1) : text;
    };
    const table = (headers, rows) => {
      if (!rows.length) return '<div class="muted">없음</div>';
      return '<table><thead><tr>' + headers.map((h) => '<th>' + escapeHtml(h) + '</th>').join('') +
        '</tr></thead><tbody>' + rows.join('') + '</tbody></table>';
    };
    async function refresh() {
      try {
        const res = await fetch('/api/state', { cache: 'no-store' });
        if (!res.ok) {
          throw new Error('HTTP ' + res.status);
        }
        const state = await res.json();
        renderState(state);
      } catch (error) {
        const message = error instanceof Error ? error.message : String(error);
        setHtml('events', '<div class="metric"><div class="label">dashboard fetch failed</div>' +
          '<div class="value error">' + escapeHtml(message) + '</div></div>');
      }
    }
    function renderState(state) {
      document.getElementById('generatedAt').textContent = state.generatedAt;
      const session = state.currentSession;
      const runtime = state.runtime;
      setHtml('metrics', [
        metric('Recording', runtime.isRecording ? 'recording' : 'idle'),
        metric('Session', session?.id ?? '-'),
        metric('Voice Channel', runtime.voiceChannelName ?? session?.voice_channel_name ?? '-'),
        metric('Open Chunks', runtime.openChunks ?? 0),
        metric('Session Status', session?.status ?? '-'),
        metric('DB', rel(state.dbPath)),
        metric('STT Auto', state.sttAutomation?.message ?? '-'),
        metric('AI Status', state.aiReadiness?.message ?? '-'),
        metric('AI Cleanup', state.aiCleanupAutomation?.message ?? '-'),
        metric('Notion', renderNotionMetric(state)),
        metric('Alone Finalize', state.aloneFinalize?.message ?? '-'),
        metric('AI Provider', state.aiReadiness ? state.aiReadiness.provider + ' / ' + state.aiReadiness.model : '-'),
        metric('Queue', queueSummary(state.queueStats ?? [])),
        metric('Repair Open', (state.recentRepairItems ?? []).filter((row) => row.status === 'open').length)
      ].join(''));

      setHtml('pipeline', [
        renderPipelineSummary(state),
        renderAloneFinalize(state.aloneFinalize),
        renderSttAutomation(state.sttAutomation),
        renderAiReadiness(state.aiReadiness),
        renderAiCleanupAutomation(state.aiCleanupAutomation)
      ].join(''));

      setHtml('speakers', table(
        ['display name', 'userId', 'bot', 'chunks', 'first seen ms'],
        (state.speakers ?? []).map((s) => '<tr><td>' + escapeHtml(s.display_name_snapshot) +
          '</td><td><code>' + escapeHtml(s.user_id) + '</code></td><td>' +
          escapeHtml(Boolean(s.is_bot)) + '</td><td>' + escapeHtml(s.chunk_count) +
          '</td><td>' + escapeHtml(s.first_seen_at_ms) + '</td></tr>')
      ));

      setHtml('chunks', table(
        ['chunk', 'speaker', 'status', 'duration', 'raw', 'stt job', 'playback'],
        (state.recentChunks ?? []).map((c) => '<tr><td><code>' + escapeHtml(c.id) +
          '</code></td><td>' + escapeHtml(c.display_name_snapshot) +
          '</td><td>' + escapeHtml(c.status) + ' / ' + escapeHtml(c.transcode_status) +
          '</td><td>' + escapeHtml(c.duration_ms ?? '-') +
          '</td><td>' + escapeHtml(rel(c.raw_audio_path)) + '<br>' + escapeHtml(c.raw_byte_size ?? '-') + ' bytes' +
          '</td><td>' + escapeHtml(c.stt_job_id ? c.stt_job_status : 'missing') +
          '</td><td>' + renderAudioControls(c) + '</td></tr>')
      ));

      setHtml('sttJobs', table(
        ['job', 'status', 'chunk', 'attempts', 'input', 'sha256'],
        (state.recentSttJobs ?? []).map((j) => '<tr><td><code>' + escapeHtml(j.id) +
          '</code></td><td>' + escapeHtml(j.status) +
          '</td><td><code>' + escapeHtml(j.chunk_id) + '</code><br>' +
          escapeHtml(j.duration_ms ?? '-') + ' ms / ' + escapeHtml(j.stt_byte_size ?? '-') + ' bytes' +
          '</td><td>' + escapeHtml(j.attempts) + ' / ' + escapeHtml(j.max_attempts) +
          '</td><td>' + escapeHtml(rel(j.input_audio_path)) +
          '</td><td><code>' + escapeHtml(shortHash(j.input_audio_sha256)) + '</code></td></tr>')
      ));

      setHtml('transcripts', table(
        ['time', 'speaker', 'speech', 'source/provider/model', 'chunk', 'text'],
        (state.recentTranscriptSegments ?? []).map((t) => '<tr><td>' +
          escapeHtml(t.start_ms) + '-' + escapeHtml(t.end_ms) +
          '</td><td>' + escapeHtml(t.display_name_snapshot) +
          '</td><td>' + escapeHtml(t.speech_status ?? 'speech') +
          '</td><td>' + escapeHtml(t.source) + ' / ' + escapeHtml(t.provider) +
          '<br><code>' + escapeHtml(t.model) + '</code>' +
          '</td><td><code>' + escapeHtml(t.chunk_id) + '</code></td><td>' +
          escapeHtml((t.speech_status === 'no_speech' && !t.text) ? '(no speech)' : t.text) + '</td></tr>')
      ));

      setHtml('aiCleanup', table(
        ['job', 'status', 'provider/model', 'attempts', 'input', 'error'],
        (state.recentAiCleanupJobs ?? []).map((j) => '<tr><td><code>' + escapeHtml(j.id) +
          '</code></td><td>' + escapeHtml(j.status) +
          '</td><td>' + escapeHtml(j.provider) + '<br><code>' + escapeHtml(j.model) + '</code>' +
          '</td><td>' + escapeHtml(j.attempts) + ' / ' + escapeHtml(j.max_attempts) +
          '</td><td>' + escapeHtml(j.input_entry_count) + '<br><code>' + escapeHtml(shortHash(j.input_hash)) + '</code>' +
          '</td><td>' + escapeHtml(j.failure_kind ?? '') + '<br>' + escapeHtml(j.last_error ?? '') + '</td></tr>')
      ));

      const draft = state.latestMeetingNotesDraft;
      setHtml('draftPreview', draft
        ? '<pre>' + escapeHtml(draft.markdown) + '</pre>'
        : '<div class="muted">아직 AI cleanup draft가 없습니다.</div>');

      setHtml('notion', renderNotionUpload(state));

      setHtml('events', table(
        ['time', 'level', 'event', 'details'],
        (state.recentConnectionEvents ?? []).map((e) => '<tr><td>' + escapeHtml(e.created_at) +
          '</td><td class="' + escapeHtml(e.level) + '">' + escapeHtml(e.level) +
          '</td><td>' + escapeHtml(e.event_type) +
          '</td><td><code>' + escapeHtml(e.details_json ?? '') + '</code></td></tr>')
      ));

      setHtml('repairs', table(
        ['updated', 'severity', 'type', 'status', 'path'],
        (state.recentRepairItems ?? []).map((r) => '<tr><td>' + escapeHtml(r.updated_at) +
          '</td><td class="' + escapeHtml(r.severity) + '">' + escapeHtml(r.severity) +
          '</td><td>' + escapeHtml(r.item_type) +
          '</td><td>' + escapeHtml(r.status) +
          '</td><td>' + escapeHtml(rel(r.path)) + '</td></tr>')
      ));
    }
    function setHtml(id, html) {
      if (sectionCache.get(id) === html) {
        return;
      }
      sectionCache.set(id, html);
      document.getElementById(id).innerHTML = html;
    }
    function metric(label, value) {
      return '<div class="metric"><div class="label">' + escapeHtml(label) +
        '</div><div class="value">' + escapeHtml(value) + '</div></div>';
    }
    function renderPipelineSummary(state) {
      const session = state.currentSession;
      if (!session) {
        return '<div class="metric"><div class="label">current session · idle</div>' +
          '<div class="value">최근 세션 없음</div><div class="muted">녹음이 시작되면 여기에 진행 상태가 표시됩니다.</div></div>';
      }
      const sttCounts = countStatuses(state.recentSttJobs ?? []);
      const latestAiJob = (state.recentAiCleanupJobs ?? [])[0];
      const draft = state.latestMeetingNotesDraft;
      const queuedOrProcessingStt =
        (sttCounts.get('queued') ?? 0) + (sttCounts.get('processing') ?? 0);
      const failedStt =
        (sttCounts.get('failed') ?? 0) + (sttCounts.get('failed_missing_file') ?? 0);
      let status = 'recording';
      let message = '녹음 중';
      if (draft) {
        status = 'done';
        message = '회의록 draft 생성 완료';
      } else if (latestAiJob?.status === 'processing') {
        status = 'running';
        message = '회의록 생성 중';
      } else if (latestAiJob?.status === 'queued') {
        status = 'queued';
        message = 'AI cleanup job 대기 중';
      } else if (latestAiJob?.status === 'failed' || latestAiJob?.status === 'blocked') {
        status = latestAiJob.status;
        message = latestAiJob.status === 'blocked' ? '회의록 생성 보류' : '회의록 생성 실패';
      } else if (queuedOrProcessingStt > 0) {
        status = 'stt';
        message = 'STT 처리 중';
      } else if (session.status === 'finalized') {
        status = 'waiting_ai';
        message = failedStt > 0 ? 'STT 확인 필요' : 'AI cleanup 대기 중';
      }
      const aiJob = latestAiJob
        ? '<br>AI job: ' + escapeHtml(latestAiJob.status) + ' / ' + escapeHtml(latestAiJob.provider) +
          ' / ' + escapeHtml(latestAiJob.model)
        : '';
      return '<div class="metric"><div class="label">current session · ' + escapeHtml(status) +
        '</div><div class="value ' + runtimeValueClass(status) + '">' + escapeHtml(message) + '</div>' +
        '<div class="muted"><code>' + escapeHtml(session.id) + '</code><br>' +
        'session: ' + escapeHtml(session.status) +
        '<br>STT: queued ' + escapeHtml(sttCounts.get('queued') ?? 0) +
        ' / processing ' + escapeHtml(sttCounts.get('processing') ?? 0) +
        ' / done ' + escapeHtml(sttCounts.get('done') ?? 0) +
        ' / failed ' + escapeHtml(failedStt) + aiJob + '</div></div>';
    }
    function renderAiReadiness(readiness) {
      if (!readiness) {
        return '<div class="muted">AI readiness snapshot이 아직 없습니다.</div>';
      }
      const action = readiness.userAction
        ? '<div class="value">' + escapeHtml(readiness.userAction) + '</div>'
        : '';
      const technical = readiness.technicalDetail
        ? '<details><summary class="muted">기술 세부정보</summary><pre>' + escapeHtml(readiness.technicalDetail) + '</pre></details>'
        : '';
      return '<div class="metric" style="margin-bottom:10px">' +
        '<div class="label">' + escapeHtml(readiness.provider) + ' / ' + escapeHtml(readiness.model) +
        ' · ' + escapeHtml(readiness.status) + ' · ' + escapeHtml(readiness.checkedAt ?? 'not checked') +
        '</div><div class="value ' + runtimeValueClass(readiness.status) + '">' + escapeHtml(readiness.message) + '</div>' +
        action + technical + '</div>';
    }
    function renderSttAutomation(automation) {
      if (!automation) {
        return '<div class="metric"><div class="label">STT automation · unavailable</div>' +
          '<div class="value">STT 자동화 snapshot이 아직 없습니다.</div></div>';
      }
      const run = automation.lastRun
        ? '<div class="muted">examined ' + escapeHtml(automation.lastRun.examined) +
          ' / done ' + escapeHtml(automation.lastRun.done) +
          ' / missing ' + escapeHtml(automation.lastRun.missingAudio) +
          ' / failed ' + escapeHtml(automation.lastRun.failed) +
          ' / more ' + escapeHtml(automation.lastRun.remainingQueuedHint > 0 ? 'yes' : 'no') + '</div>'
        : '';
      const action = automation.userAction
        ? '<div class="value">' + escapeHtml(automation.userAction) + '</div>'
        : '';
      const technical = automation.technicalDetail
        ? '<details><summary class="muted">STT 자동화 세부정보</summary><pre>' + escapeHtml(automation.technicalDetail) + '</pre></details>'
        : '';
      return '<div class="metric" style="margin-bottom:10px">' +
        '<div class="label">' + escapeHtml(automation.provider) + ' / ' + escapeHtml(automation.model) +
        ' · ' + escapeHtml(automation.status) + ' · ' + escapeHtml(automation.checkedAt ?? 'not checked') +
        '</div><div class="value ' + runtimeValueClass(automation.status) + '">' + escapeHtml(automation.message) + '</div>' +
        run + action + technical + '</div>';
    }
    function renderAiCleanupAutomation(automation) {
      if (!automation) {
        return '<div class="muted">AI cleanup 자동화 snapshot이 아직 없습니다.</div>';
      }
      const action = automation.userAction
        ? '<div class="value">' + escapeHtml(automation.userAction) + '</div>'
        : '';
      const stt = automation.stt
        ? '<div class="muted">STT done ' + escapeHtml(automation.stt.sttDoneCount) +
          ' / failed ' + escapeHtml(automation.stt.sttFailedCount) +
          ' / missing file ' + escapeHtml(automation.stt.sttFailedMissingFileCount) +
          ' / real transcript ' + escapeHtml(automation.stt.realTranscriptEntryCount) + '</div>'
        : '';
      const warnings = automation.warnings?.length
        ? '<div class="warn">' + automation.warnings.map(escapeHtml).join(', ') + '</div>'
        : '';
      const progress = automation.progress
        ? '<div class="muted">progress ' + escapeHtml(automation.progress.phase) +
          ' · elapsed ' + escapeHtml(automation.progress.elapsedMs) + 'ms' +
          ' · lines ' + escapeHtml(automation.progress.streamLineCount) +
          ' · bytes ' + escapeHtml(automation.progress.stdoutBytes) +
          ' · last ' + escapeHtml(automation.progress.lastEventType ?? '-') +
          (automation.progress.repairAttempt ? ' · repair' : '') + '</div>'
        : '';
      const technical = automation.technicalDetail
        ? '<details><summary class="muted">자동화 세부정보</summary><pre>' + escapeHtml(automation.technicalDetail) + '</pre></details>'
        : '';
      return '<div class="metric" style="margin-bottom:10px">' +
        '<div class="label">' + escapeHtml(automation.provider) + ' / ' + escapeHtml(automation.model) +
        ' · ' + escapeHtml(automation.status) + ' · ' + escapeHtml(automation.checkedAt ?? 'not checked') +
        '</div><div class="value ' + runtimeValueClass(automation.status) + '">' + escapeHtml(automation.message) + '</div>' +
        stt + progress + warnings + action + technical + '</div>';
    }
    function renderNotionUpload(state) {
      const notion = state.notion;
      const latest = state.latestNotionWrite;
      if (!notion) {
        return '<div class="metric"><div class="label">notion · unavailable</div>' +
          '<div class="value">Notion 상태를 아직 불러오지 못했습니다.</div></div>';
      }
      const page = latest?.notion_page_url
        ? '<div class="value"><a href="' + escapeHtml(latest.notion_page_url) + '" target="_blank" rel="noreferrer">Open Notion page</a></div>'
        : '';
      const error = latest?.last_error
        ? '<details><summary class="muted">last error</summary><pre>' + escapeHtml(latest.last_error) + '</pre></details>'
        : '';
      const action = notion.userAction
        ? '<div class="value">' + escapeHtml(notion.userAction) + '</div>'
        : '';
      const automation = state.notionAutomation
        ? '<div class="muted">automation: ' + escapeHtml(state.notionAutomation.status) +
          ' · ' + escapeHtml(state.notionAutomation.message) + '</div>'
        : '';
      const buttons = renderNotionButtons(state);
      return '<div class="metric">' +
        '<div class="label">notion · ' + escapeHtml(notion.status) + ' · ' + escapeHtml(notion.uploadMode) + '</div>' +
        '<div class="value ' + runtimeValueClass(latest?.status ?? notion.status) + '">' +
          escapeHtml(latest?.status ?? notion.message) + '</div>' +
        '<div class="muted">target: ' + escapeHtml(notion.targetUrl ?? '-') +
        '<br>write: ' + escapeHtml(latest?.id ?? '-') +
        '<br>draft: ' + escapeHtml(latest?.draft_id ?? state.latestMeetingNotesDraft?.id ?? '-') +
        '<br>hash: ' + escapeHtml(shortHash(latest?.content_hash)) + '</div>' +
        page + automation + action + buttons + error + '</div>';
    }
    function renderNotionMetric(state) {
      const latest = state.latestNotionWrite;
      if (latest) {
        const auto = state.notionAutomation?.status ? ' / auto ' + state.notionAutomation.status : '';
        return latest.status + (latest.notion_page_url ? ' / page ready' : '') + auto;
      }
      return state.notionAutomation?.message ?? state.notion?.message ?? '-';
    }
    function renderNotionButtons(state) {
      const draftId = state.latestMeetingNotesDraft?.id ?? '';
      const sessionId = state.currentSession?.id ?? '';
      const disabled = (!draftId && !sessionId) || state.notion?.status !== 'ready';
      const disabledAttr = disabled ? ' disabled' : '';
      return '<div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">' +
        '<button type="button"' + disabledAttr + ' onclick="postNotionAction(\'send\')">Send to Notion</button>' +
        '<button type="button"' + disabledAttr + ' onclick="postNotionAction(\'retry\')">Retry</button>' +
        '<span class="muted" id="notionActionStatus"></span>' +
        '</div>';
    }
    async function postNotionAction(action) {
      const statusEl = document.getElementById('notionActionStatus');
      if (statusEl) statusEl.textContent = 'running...';
      try {
        const stateRes = await fetch('/api/state', { cache: 'no-store' });
        const state = await stateRes.json();
        const body = {
          draftId: state.latestMeetingNotesDraft?.id ?? null,
          sessionId: state.currentSession?.id ?? null
        };
        const res = await fetch('/api/notion/' + action, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const result = await res.json();
        if (statusEl) statusEl.textContent = result.status + ': ' + result.message;
        refresh();
      } catch (error) {
        const message = error instanceof Error ? error.message : String(error);
        if (statusEl) statusEl.textContent = message;
      }
    }
    function renderAloneFinalize(aloneFinalize) {
      if (!aloneFinalize) {
        return '';
      }
      const countdown = aloneFinalize.status === 'countdown' && aloneFinalize.remainingMs !== null
        ? '<div class="muted">자동 종료까지 ' + escapeHtml(Math.ceil(aloneFinalize.remainingMs / 1000)) + '초</div>'
        : '';
      const action = aloneFinalize.userAction
        ? '<div class="value">' + escapeHtml(aloneFinalize.userAction) + '</div>'
        : '';
      const warnings = aloneFinalize.warnings?.length
        ? '<div class="warn">' + aloneFinalize.warnings.map(escapeHtml).join(', ') + '</div>'
        : '';
      const technical = aloneFinalize.technicalDetail
        ? '<details><summary class="muted">혼자 남음 세부정보</summary><pre>' + escapeHtml(aloneFinalize.technicalDetail) + '</pre></details>'
        : '';
      return '<div class="metric" style="margin-bottom:10px">' +
        '<div class="label">alone finalize · ' + escapeHtml(aloneFinalize.status) +
        ' · ' + escapeHtml(aloneFinalize.checkedAt ?? 'not checked') +
        '</div><div class="value ' + runtimeValueClass(aloneFinalize.status) + '">' + escapeHtml(aloneFinalize.message) + '</div>' +
        countdown + action + warnings + technical + '</div>';
    }
    function renderAudioControls(c) {
      if (!(c.raw_byte_size > 0) || c.status === 'writing') {
        return '<span class="muted">pending</span>';
      }
      const encoded = encodeURIComponent(c.id);
      const stt = c.stt_audio_path && c.stt_byte_size > 0
        ? '<div class="label">STT-safe</div><audio controls preload="metadata" src="/audio/' + encoded + '/stt"></audio>'
        : '';
      return stt + '<div class="label">Raw</div><audio controls preload="metadata" src="/audio/' + encoded + '/raw"></audio>';
    }
    function shortHash(value) {
      if (!value) return '';
      return String(value).slice(0, 12);
    }
    function queueSummary(rows) {
      const counts = new Map(rows.map((row) => [row.status, row.count]));
      return ['queued', 'processing', 'done', 'failed', 'failed_missing_file']
        .map((status) => status + ':' + (counts.get(status) ?? 0))
        .join(' / ');
    }
    function countStatuses(rows) {
      const counts = new Map();
      for (const row of rows) {
        counts.set(row.status, (counts.get(row.status) ?? 0) + 1);
      }
      return counts;
    }
    function runtimeValueClass(status) {
      if (['failed', 'blocked', 'not_installed', 'failed_missing_file'].includes(String(status))) {
        return 'error';
      }
      if ([
        'running',
        'queued',
        'processing',
        'countdown',
        'checking',
        'waiting_for_stt',
        'waiting_for_ai_provider',
        'waiting_ai',
        'stt',
      ].includes(String(status))) {
        return 'warn';
      }
      return 'status';
    }
    refresh();
    setInterval(refresh, 3000);
  </script>
</body>
</html>
