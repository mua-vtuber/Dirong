<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dirong Recording + STT Dashboard</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f7f4;
      --panel: #ffffff;
      --ink: #1f2328;
      --muted: #646b75;
      --line: #d9dfe7;
      --accent: #0f766e;
      --warn: #a15c00;
      --error: #b42318;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, "Malgun Gothic", sans-serif;
      background: var(--bg);
      color: var(--ink);
      letter-spacing: 0;
    }
    header {
      padding: 18px 24px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }
    h1 { margin: 0; font-size: 22px; }
    main { max-width: 1240px; margin: 0 auto; padding: 20px; }
    section { margin: 0 0 22px; }
    h2 { font-size: 16px; margin: 0 0 10px; }
    .grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; }
    .pipeline-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; }
    .metric {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      min-height: 74px;
    }
    .label { color: var(--muted); font-size: 12px; margin-bottom: 8px; }
    .value { font-size: 15px; overflow-wrap: anywhere; }
    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }
    th, td {
      padding: 8px 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
      font-size: 13px;
      overflow-wrap: anywhere;
    }
    th { color: var(--muted); font-weight: 600; background: #fbfbf9; }
    tr:last-child td { border-bottom: 0; }
    code { font-family: Consolas, monospace; font-size: 12px; }
    pre {
      margin: 0;
      padding: 12px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      max-height: 360px;
      overflow: auto;
      font-family: Consolas, "Malgun Gothic", monospace;
      font-size: 13px;
    }
    audio { width: 220px; max-width: 100%; height: 32px; }
    .status { color: var(--accent); font-weight: 700; }
    .warn { color: var(--warn); }
    .error { color: var(--error); }
    .muted { color: var(--muted); }
    .toolbar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin: 10px 0; }
    .setup-shell {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    .setup-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 14px;
    }
    .setup-title { margin: 0; font-size: 20px; }
    .setup-progress {
      min-width: 128px;
      color: var(--muted);
      font-size: 13px;
      text-align: right;
    }
    .setup-layout { display: grid; grid-template-columns: 260px minmax(0, 1fr); gap: 16px; }
    .setup-steps { display: grid; gap: 6px; align-content: start; }
    .setup-step {
      width: 100%;
      text-align: left;
      border-radius: 6px;
      background: #ffffff;
    }
    .setup-step.is-active { border-color: var(--accent); color: var(--accent); font-weight: 700; }
    .setup-step.is-ready { color: var(--accent); }
    .setup-panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      background: #fbfbf9;
    }
    .setup-panel h3 { margin: 0 0 8px; font-size: 18px; }
    .setup-copy { margin: 0 0 12px; color: var(--muted); line-height: 1.45; }
    .setup-cards { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; margin: 10px 0; }
    .setup-card {
      display: block;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #ffffff;
      cursor: pointer;
      min-height: 88px;
    }
    .setup-card input { width: auto; margin-right: 8px; }
    .setup-card strong { display: inline-block; margin-bottom: 6px; }
    .setup-card.is-selected { border-color: var(--accent); box-shadow: inset 0 0 0 1px var(--accent); }
    .setup-form { display: grid; gap: 10px; max-width: 720px; }
    .setup-form label { display: grid; gap: 5px; color: var(--muted); font-size: 13px; }
    .setup-form input[type="password"], .setup-form input[type="url"] {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 7px;
      font: inherit;
      color: var(--ink);
      background: #ffffff;
    }
    .setup-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; align-items: center; }
    .setup-result {
      margin-top: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #ffffff;
    }
    .setup-result:empty { display: none; }
    .setup-status-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; margin-top: 12px; }
    .setup-status-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #ffffff;
      min-height: 86px;
    }
    .setup-guild-list { display: grid; gap: 8px; margin-top: 10px; }
    .setup-guild {
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #ffffff;
      cursor: pointer;
    }
    .setup-guild input { width: auto; }
    .setup-notice {
      border-left: 4px solid var(--warn);
      background: #fff7ed;
      padding: 10px 12px;
      border-radius: 6px;
      color: #7c2d12;
      margin: 10px 0;
    }
    .setup-ok {
      border-left-color: var(--accent);
      background: #ecfdf5;
      color: #065f46;
    }
    button {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #ffffff;
      color: var(--ink);
      padding: 7px 10px;
      cursor: pointer;
    }
    button:disabled { color: var(--muted); cursor: not-allowed; background: #f3f4f6; }
    textarea, input[type="number"], input[type="text"], select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 7px;
      font: inherit;
      color: var(--ink);
      background: #ffffff;
    }
    textarea { min-height: 72px; resize: vertical; }
    input[type="number"] { max-width: 96px; }
    .relation-fields { margin-top: 8px; display: grid; gap: 6px; }
    .relation-fields label { display: block; }
    @media (max-width: 860px) {
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .pipeline-grid { grid-template-columns: repeat(1, minmax(0, 1fr)); }
      .setup-layout { grid-template-columns: 1fr; }
      .setup-cards { grid-template-columns: 1fr; }
      .setup-status-grid { grid-template-columns: 1fr; }
      .setup-progress { text-align: left; }
      .setup-top { display: block; }
      main { padding: 14px; }
      th, td { font-size: 12px; padding: 7px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Dirong Recording + STT Dashboard</h1>
    <div class="muted" id="generatedAt">loading</div>
  </header>
  <main>
    <section id="setupWizard" class="setup-shell"></section>
    <section class="grid" id="metrics"></section>
    <section>
      <h2>Pipeline Runtime</h2>
      <div class="pipeline-grid" id="pipeline"></div>
    </section>
    <section>
      <h2>Speakers</h2>
      <div id="speakers"></div>
    </section>
    <section>
      <h2>Recent Chunks</h2>
      <div id="chunks"></div>
    </section>
    <section>
      <h2>STT Queue</h2>
      <div id="sttJobs"></div>
    </section>
    <section>
      <h2>Transcript Segments</h2>
      <div id="transcripts"></div>
    </section>
    <section>
      <h2>AI Cleanup</h2>
      <div id="aiCleanup"></div>
    </section>
    <section>
      <h2>Latest Draft Preview</h2>
      <div id="draftPreview"></div>
    </section>
    <section>
      <h2>Notion Upload</h2>
      <div id="notion"></div>
    </section>
    <section>
      <h2>Notion Property Rules</h2>
      <div id="notionProperties"></div>
    </section>
    <section>
      <h2>Connection / Errors</h2>
      <div id="events"></div>
    </section>
    <section>
      <h2>Repair Items</h2>
      <div id="repairs"></div>
    </section>
  </main>
  <script>
    const escapeHtml = (value) => String(value ?? "").replace(/[&<>"']/g, (ch) => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;"
    }[ch]));
    const sectionCache = new Map();
    const setupLocalState = {
      stepIndex: Number(window.localStorage.getItem('dirong.setup.stepIndex') ?? 0),
      welcomeDone: window.localStorage.getItem('dirong.setup.welcomeDone') === 'true',
      recordingDone: window.localStorage.getItem('dirong.setup.recordingDone') === 'true',
      privacyDone: window.localStorage.getItem('dirong.setup.privacyDone') === 'true',
      sttProvider: window.localStorage.getItem('dirong.setup.sttProvider') ?? 'local-whisper',
      sttModel: window.localStorage.getItem('dirong.setup.sttModel') ?? 'small',
      aiMode: window.localStorage.getItem('dirong.setup.aiMode') ?? 'cli',
      selectedGuildId: window.localStorage.getItem('dirong.setup.guildId') ?? '',
      guilds: [],
      lastResult: null,
      busy: false,
      forceRender: false
    };
    let notionRulesDirty = false;
    let notionSchemaResult = null;
    const rel = (value) => {
      if (!value) return "";
      const text = String(value).replaceAll("\\", "/");
      const idx = text.lastIndexOf("/data/");
      return idx >= 0 ? text.slice(idx + 1) : text;
    };
    const table = (headers, rows) => {
      if (!rows.length) return '<div class="muted">없음</div>';
      return '<table><thead><tr>' + headers.map((h) => '<th>' + escapeHtml(h) + '</th>').join('') +
        '</tr></thead><tbody>' + rows.join('') + '</tbody></table>';
    };
    const setupStepDefinitions = [
      { id: 'language', title: '언어 선택' },
      { id: 'welcome', title: '환영/모드 선택' },
      { id: 'discord', title: 'Discord 봇 연결' },
      { id: 'guild', title: 'Discord 서버 선택' },
      { id: 'stt', title: 'STT provider/model 선택' },
      { id: 'ai', title: 'Claude CLI/API 선택' },
      { id: 'notionToken', title: 'Notion token 입력' },
      { id: 'notionParent', title: 'Notion parent page URL 입력' },
      { id: 'notionManaged', title: 'managed DB 생성' },
      { id: 'recording', title: '녹음 자동 종료 확인' },
      { id: 'privacy', title: '개인정보/보관 정책 확인' },
      { id: 'final', title: '최종 점검' }
    ];
    function renderSetupWizard(setup) {
      const root = document.getElementById('setupWizard');
      const active = document.activeElement;
      if (
        !setupLocalState.forceRender &&
        active &&
        root.contains(active) &&
        ['INPUT', 'TEXTAREA', 'SELECT'].includes(active.tagName)
      ) {
        return;
      }
      if (!setup) {
        setHtml('setupWizard', '<div class="setup-top"><div><h2 class="setup-title">첫 설정 위자드</h2>' +
          '<p class="setup-copy">설정 상태 API를 기다리는 중입니다.</p></div></div>');
        return;
      }
      setupLocalState.lastSetup = setup;
      const firstIncomplete = setupStepDefinitions.findIndex((step) => !isSetupStepReady(setup, step.id));
      const currentLimit = firstIncomplete >= 0 ? firstIncomplete : setupStepDefinitions.length - 1;
      if (!Number.isFinite(setupLocalState.stepIndex) || setupLocalState.stepIndex < 0) {
        setupLocalState.stepIndex = 0;
      }
      if (setupLocalState.stepIndex > currentLimit && !isSetupStepReady(setup, setupStepDefinitions[setupLocalState.stepIndex]?.id)) {
        setupLocalState.stepIndex = currentLimit;
        window.localStorage.setItem('dirong.setup.stepIndex', String(setupLocalState.stepIndex));
      }
      const activeStep = setupStepDefinitions[setupLocalState.stepIndex] ?? setupStepDefinitions[0];
      const progress = setupStepDefinitions.filter((step) => isSetupStepReady(setup, step.id)).length;
      const stepButtons = setupStepDefinitions.map((step, index) => {
        const ready = isSetupStepReady(setup, step.id);
        const current = index === setupLocalState.stepIndex;
        const disabled = index > currentLimit && !ready;
        const className = 'setup-step' + (current ? ' is-active' : '') + (ready ? ' is-ready' : '');
        const mark = ready ? '✓ ' : current ? '• ' : '';
        return '<button type="button" class="' + className + '"' +
          (disabled ? ' disabled' : '') + ' onclick="setSetupStep(' + index + ')">' +
          mark + escapeHtml(step.title) + '</button>';
      }).join('');
      setHtml('setupWizard',
        '<div class="setup-top"><div><h2 class="setup-title">첫 설정 위자드</h2>' +
        '<p class="setup-copy">비개발자도 token, 서버 선택, STT, Claude, Notion 생성까지 대시보드에서 끝낼 수 있게 안내합니다.</p>' +
        '</div><div class="setup-progress">' + escapeHtml(progress) + ' / ' + escapeHtml(setupStepDefinitions.length) +
        '<br>' + escapeHtml(setup.status ?? 'not_configured') + '</div></div>' +
        '<div class="setup-layout"><nav class="setup-steps">' + stepButtons + '</nav>' +
        '<div class="setup-panel">' + renderSetupStepContent(activeStep.id, setup) +
        renderSetupResult() + '</div></div>'
      );
    }
    function isSetupStepReady(setup, id) {
      if (!setup) return false;
      if (id === 'language') return setup.locale === 'ko' || setup.locale === 'en';
      if (id === 'welcome') return setupLocalState.welcomeDone;
      if (id === 'discord') {
        return Boolean(setup.features?.discord?.applicationIdConfigured && setup.secrets?.discordBot?.configured);
      }
      if (id === 'guild') return (setup.features?.discord?.guildAllowlistCount ?? 0) > 0;
      if (id === 'stt') return setup.features?.stt?.status === 'ready';
      if (id === 'ai') return setup.features?.ai?.status === 'ready';
      if (id === 'notionToken') return setup.secrets?.notion?.configured === true;
      if (id === 'notionParent') return setup.features?.notion?.parentPageConfigured === true;
      if (id === 'notionManaged') return setup.features?.notion?.managedRegistryReady === true;
      if (id === 'recording') return setupLocalState.recordingDone;
      if (id === 'privacy') return setupLocalState.privacyDone;
      if (id === 'final') {
        return setup.status === 'ready' && setupLocalState.recordingDone && setupLocalState.privacyDone;
      }
      return false;
    }
    function renderSetupStepContent(id, setup) {
      if (id === 'language') return renderSetupLanguage(setup);
      if (id === 'welcome') return renderSetupWelcome();
      if (id === 'discord') return renderSetupDiscord(setup);
      if (id === 'guild') return renderSetupGuild(setup);
      if (id === 'stt') return renderSetupStt(setup);
      if (id === 'ai') return renderSetupAi(setup);
      if (id === 'notionToken') return renderSetupNotionToken(setup);
      if (id === 'notionParent') return renderSetupNotionParent(setup);
      if (id === 'notionManaged') return renderSetupNotionManaged(setup);
      if (id === 'recording') return renderSetupRecording();
      if (id === 'privacy') return renderSetupPrivacy(setup);
      return renderSetupFinal(setup);
    }
    function renderSetupLanguage(setup) {
      const locale = setup.locale ?? 'ko';
      return '<h3>앱 언어를 선택해 주세요</h3>' +
        '<p class="setup-copy">MVP에서는 앱 언어, 위자드 언어, Notion schema locale을 같은 값으로 저장합니다.</p>' +
        '<div class="setup-cards">' +
        setupRadioCard('setupLanguage', 'ko', locale, '한국어', 'Notion managed DB 생성을 지원합니다.') +
        setupRadioCard('setupLanguage', 'en', locale, 'English', 'UI language can be saved, but managed Notion DB creation is limited to Korean in this MVP.') +
        '</div>' +
        (locale === 'en' ? '<div class="setup-notice">English를 선택하면 Notion schema locale도 en으로 저장됩니다. 단, 이번 MVP의 managed Notion DB 자동 생성은 한국어 preset만 지원하므로 생성 단계에서 한국어로 전환하라는 안내가 표시됩니다.</div>' : '') +
        '<div class="setup-actions"><button type="button" onclick="setupSaveLanguage()">언어 저장</button>' +
        setupNextButton(setup, 'language') + '</div>';
    }
    function renderSetupWelcome() {
      return '<h3>로컬 개인 모드로 시작합니다</h3>' +
        '<p class="setup-copy">Dirong은 사용자의 PC에서 Discord 녹음, STT, Claude 회의록 생성, Notion 업로드를 연결합니다. Hosted Dirong bot이나 Notion OAuth는 이번 범위에 포함하지 않습니다.</p>' +
        '<div class="setup-cards">' +
        '<label class="setup-card is-selected"><input type="radio" checked> <strong>로컬 개인 모드</strong><br><span class="muted">사용자 소유 Discord bot token과 Notion internal connection을 저장합니다.</span></label>' +
        '<label class="setup-card"><input type="radio" disabled> <strong>Hosted mode</strong><br><span class="muted">후속 제품 결정 뒤 지원합니다.</span></label>' +
        '</div><div class="setup-actions"><button type="button" onclick="setupAcknowledge(&quot;welcomeDone&quot;)">계속</button></div>';
    }
    function renderSetupDiscord(setup) {
      const inviteUrl = setup.wizard?.inviteUrl ?? setupLocalState.lastResult?.inviteUrl ?? '';
      return '<h3>Discord 봇을 연결합니다</h3>' +
        '<p class="setup-copy">Discord Developer Portal에서 만든 application ID와 bot token을 저장합니다. Token은 저장 후 다시 표시하지 않습니다.</p>' +
        '<div class="setup-form">' +
        '<label>Discord application ID<input id="setupDiscordApplicationId" type="text" inputmode="numeric" autocomplete="off" placeholder="숫자 application ID"></label>' +
        '<div class="setup-actions"><button type="button" onclick="setupSaveDiscordApplicationId()">애플리케이션 ID 저장</button></div>' +
        (inviteUrl ? '<div class="setup-result setup-ok"><div class="label">초대 링크</div><a href="' + escapeHtml(inviteUrl) + '" target="_blank" rel="noreferrer">Discord 서버에 Dirong 봇 추가</a></div>' : '') +
        '<label>Discord bot token<input id="setupDiscordBotToken" type="password" autocomplete="off" placeholder="저장 후 화면에 다시 표시되지 않습니다"></label>' +
        '<div class="setup-actions"><button type="button" onclick="setupSaveDiscordBotToken()">bot token 저장</button>' +
        '<button type="button" onclick="setupTestDiscord()">연결 확인</button>' + setupNextButton(setup, 'discord') + '</div>' +
        '</div>';
    }
    function renderSetupGuild(setup) {
      const guilds = setupLocalState.guilds ?? [];
      const list = guilds.length
        ? '<div class="setup-guild-list">' + guilds.map((guild) =>
            '<label class="setup-guild"><input type="radio" name="setupGuild" value="' + escapeHtml(guild.id) + '"' +
            (setupLocalState.selectedGuildId === guild.id ? ' checked' : '') +
            ' onchange="setupRememberGuild(this.value)"> <strong>' + escapeHtml(guild.name) + '</strong></label>'
          ).join('') + '</div>'
        : '<div class="muted">아직 서버 목록을 불러오지 않았습니다.</div>';
      return '<h3>녹음을 허용할 Discord 서버를 선택합니다</h3>' +
        '<p class="setup-copy">봇이 들어간 서버 이름만 보여줍니다. 서버 ID는 직접 입력하지 않습니다.</p>' +
        '<div class="setup-actions"><button type="button" onclick="setupLoadGuilds()">서버 목록 불러오기</button></div>' +
        list +
        '<div class="setup-actions"><button type="button" onclick="setupSaveGuild()">선택한 서버 저장</button>' +
        setupNextButton(setup, 'guild') + '</div>';
    }
    function renderSetupStt(setup) {
      const provider = setupLocalState.sttProvider;
      const model = setupLocalState.sttModel;
      return '<h3>STT provider와 모델을 선택합니다</h3>' +
        '<p class="setup-copy">기본 추천은 내 PC에서 처리하는 local faster-whisper입니다. OpenAI STT는 API 발급이 필요한 유료 고급 대안입니다.</p>' +
        '<div class="setup-cards">' +
        setupRadioCard('setupSttProvider', 'local-whisper', provider, '추천: local faster-whisper', '무료이며 음성이 외부 STT API로 전송되지 않습니다.', 'setupRememberSttProvider') +
        setupRadioCard('setupSttProvider', 'openai', provider, '고급: OpenAI STT 사용 (API 발급 필요 - 유료)', '처리는 쉬울 수 있지만 API 비용이 발생하고 음성이 OpenAI로 전송됩니다.', 'setupRememberSttProvider') +
        '</div>' +
        (provider === 'local-whisper'
          ? '<div class="setup-cards">' +
            setupRadioCard('setupSttModel', 'small', model, '추천: 빠름', 'small / cpu / int8. 대부분의 PC에 먼저 권장합니다.', 'setupRememberSttModel') +
            setupRadioCard('setupSttModel', 'medium', model, '정확도 우선', 'medium / cpu / int8. 더 느릴 수 있지만 한국어 회의 품질이 좋아질 수 있습니다.', 'setupRememberSttModel') +
            '</div>'
          : '<div class="setup-form"><label>OpenAI API key<input id="setupOpenAiApiKey" type="password" autocomplete="off" placeholder="API 발급 필요 - 유료"></label></div>') +
        '<div class="setup-actions"><button type="button" onclick="setupSaveStt()">STT 설정 저장</button>' +
        setupNextButton(setup, 'stt') + '</div>';
    }
    function renderSetupAi(setup) {
      const mode = setupLocalState.aiMode;

    async function setupPost(path, body) {
      setupLocalState.busy = true;
      try {
        const res = await fetch(path, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body ?? {})
        });
        const result = await res.json();
        setupLocalState.lastResult = result;
        if (Array.isArray(result.guilds)) {
          setupLocalState.guilds = result.guilds;
        }
        setupLocalState.forceRender = true;
        await refresh();
        setupLocalState.forceRender = false;
        return result;
      } catch (error) {
        const message = error instanceof Error ? error.message : String(error);
        setupLocalState.lastResult = { ok: false, status: 'failed', message, userAction: '잠시 후 다시 시도해 주세요.' };
        setupLocalState.forceRender = true;
        renderSetupWizard(setupLocalState.lastSetup);
        setupLocalState.forceRender = false;
        return setupLocalState.lastResult;
      } finally {
        setupLocalState.busy = false;
      }
    }

    async function refresh() {
      try {
        const [res, setupRes] = await Promise.all([
          fetch('/api/state', { cache: 'no-store' }),
          fetch('/api/setup/state', { cache: 'no-store' })
        ]);
        if (!res.ok) {
          throw new Error('HTTP ' + res.status);
        }
        const state = await res.json();
        const setup = setupRes.ok ? await setupRes.json() : state.setup ?? null;
        renderState(state, setup);
      } catch (error) {
        const message = error instanceof Error ? error.message : String(error);
        setHtml('events', '<div class="metric"><div class="label">dashboard fetch failed</div>' +
          '<div class="value error">' + escapeHtml(message) + '</div></div>');
        setHtml('setupWizard', '<div class="setup-top"><div><h2 class="setup-title">첫 설정 위자드</h2>' +
          '<p class="setup-copy">설정 상태를 불러오지 못했습니다.</p></div></div>' +
          '<div class="setup-result"><div class="value error">' + escapeHtml(message) + '</div></div>');
      }
    }

    function renderNotionSchemaResult(result) {

        return '';

        : '';
      if (!diff) {

          escapeHtml(result.status + ': ' + result.message) + '</div>' + warnings + '</div>';
      }

        .concat((diff.missing ?? []).map((item) => schemaRow('누락', item.propertyName, item.propertyType, item.source)))
        .concat((diff.renames ?? []).map((item) => schemaRow('이름변경', item.fromName + ' -> ' + item.toName, item.propertyType, item.source)))
        .concat((diff.wrongType ?? []).map((item) => schemaRow('타입불일치', item.propertyName, item.actualType + ' -> ' + item.expectedType, item.canUpdate ? '자동 가능' : '수동 필요')))
        .concat((diff.missingOptions ?? []).map((item) => schemaRow('옵션누락', item.propertyName, item.missingOptions.join(', '), item.canUpdate ? '자동 가능' : '수동 필요')))
        .concat((diff.extra ?? []).map((item) => schemaRow('관리외', item.propertyName, item.propertyType, item.canDelete ? '삭제 가능' : '보존')));
      const detail = rows.length
        ? table(['구분', '속성', '타입/내용', '처리'], rows)
        : '<div class="muted">스키마가 맞습니다.</div>';
      return '<div style="margin-top:10px">' +
        '<div class="label">schema · ' + escapeHtml(result.status) + '</div>' +
        '<div class="value ' + runtimeValueClass(result.status) + '">' + escapeHtml(result.message) + '</div>' +
        (result.userAction ? '<div class="muted">' + escapeHtml(result.userAction) + '</div>' : '') +
        warnings + detail + '</div>';

    function schemaRow(kind, property, type, handling) {

    async function saveNotionPropertyRules(options = {}) {
      const statusEl = document.getElementById('notionPropertyStatus');
      if (statusEl) statusEl.textContent = 'saving...';
      const rules = Array.from(document.querySelectorAll('[data-notion-rule-row]')).map((row) => ({
        originalPropertyName: row.getAttribute('data-original-property-name') || null,
        propertyName: row.querySelector('[data-field="propertyName"]')?.value ?? '',
        propertyType: row.querySelector('[data-field="propertyType"]')?.value ?? 'rich_text',
        valueSource: row.querySelector('[data-field="valueSource"]')?.value ?? 'ai',
        enabled: row.querySelector('[data-field="enabled"]')?.checked === true,
        promptDescription: row.querySelector('[data-field="promptDescription"]')?.value ?? '',
        maxLength: Number(row.querySelector('[data-field="maxLength"]')?.value ?? 1000),
        relationTargetUrl: row.querySelector('[data-field="relationTargetUrl"]')?.value ?? '',
        relationDataSourceId: row.querySelector('[data-field="relationDataSourceId"]')?.value ?? '',
        relationTargetPageUrl: row.querySelector('[data-field="relationTargetPageUrl"]')?.value ?? '',
        relationTargetPageId: row.querySelector('[data-field="relationTargetPageId"]')?.value ?? '',
        relationMatchPropertyName: row.querySelector('[data-field="relationMatchPropertyName"]')?.value ?? 'Name',
        relationAutoCreate: row.querySelector('[data-field="relationAutoCreate"]')?.checked === true,
        deleted: row.getAttribute('data-deleted') === 'true'
      }));
      try {
        const res = await fetch('/api/notion/properties', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ rules })
        });

        notionRulesDirty = false;
        if (statusEl) statusEl.textContent = result.status + ': ' + result.message;
        if (options.refresh !== false) {
          refresh();

        if (statusEl) statusEl.textContent = message;

      }

          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: '{}'
        });

    async function applyNotionSchema() {

      if (statusEl) statusEl.textContent = 'applying schema...';
      try {
        if (notionRulesDirty) {
          await saveNotionPropertyRules({ refresh: false });
        }
        const deleteExtra = document.getElementById('notionSchemaDeleteExtra')?.checked === true;
        const confirmDeleteExtra = deleteExtra
          ? window.confirm('관리 외 Notion 속성을 삭제합니다. 해당 컬럼 값도 사라질 수 있습니다. 계속할까요?')
          : false;

          updateTypes: document.getElementById('notionSchemaUpdateTypes')?.checked === true,
          deleteExtra,
          confirmDeleteExtra
        };
        const res = await fetch('/api/notion/schema/apply', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        notionSchemaResult = await res.json();
        if (statusEl) statusEl.textContent = notionSchemaResult.status + ': ' + notionSchemaResult.message;
        notionRulesDirty = false;
        refresh();
      } catch (error) {
        const message = error instanceof Error ? error.message : String(error);
        if (statusEl) statusEl.textContent = message;
      }
    }
    async function postNotionAction(action) {
      const statusEl = document.getElementById('notionActionStatus');
      if (statusEl) statusEl.textContent = 'running...';
      try {
        const stateRes = await fetch('/api/state', { cache: 'no-store' });
        const state = await stateRes.json();
        const body = {
          draftId: state.latestMeetingNotesDraft?.id ?? null,
          sessionId: state.currentSession?.id ?? null
        };
        const res = await fetch('/api/notion/' + action, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const result = await res.json();
        if (statusEl) statusEl.textContent = result.status + ': ' + result.message;
        refresh();
      } catch (error) {
        const message = error instanceof Error ? error.message : String(error);
        if (statusEl) statusEl.textContent = message;
      }
    }
    function renderAloneFinalize(aloneFinalize) {
      if (!aloneFinalize) {
        return '';
      }
      const countdown = aloneFinalize.status === 'countdown' && aloneFinalize.remainingMs !== null
        ? '<div class="muted">자동 종료까지 ' + escapeHtml(Math.ceil(aloneFinalize.remainingMs / 1000)) + '초</div>'
        : '';
      const action = aloneFinalize.userAction
        ? '<div class="value">' + escapeHtml(aloneFinalize.userAction) + '</div>'
        : '';
      const warnings = aloneFinalize.warnings?.length
        ? '<div class="warn">' + aloneFinalize.warnings.map(escapeHtml).join(', ') + '</div>'
        : '';
      const technical = aloneFinalize.technicalDetail
        ? '<details><summary class="muted">혼자 남음 세부정보</summary><pre>' + escapeHtml(aloneFinalize.technicalDetail) + '</pre></details>'
        : '';
      return '<div class="metric" style="margin-bottom:10px">' +
        '<div class="label">alone finalize · ' + escapeHtml(aloneFinalize.status) +
        ' · ' + escapeHtml(aloneFinalize.checkedAt ?? 'not checked') +
        '</div><div class="value ' + runtimeValueClass(aloneFinalize.status) + '">' + escapeHtml(aloneFinalize.message) + '</div>' +
        countdown + action + warnings + technical + '</div>';
    }
    function renderAudioControls(c) {
      if (!(c.raw_byte_size > 0) || c.status === 'writing') {
        return '<span class="muted">pending</span>';
      }
      const encoded = encodeURIComponent(c.id);
      const stt = c.stt_audio_path && c.stt_byte_size > 0
        ? '<div class="label">STT-safe</div><audio controls preload="metadata" src="/audio/' + encoded + '/stt"></audio>'
        : '';
      return stt + '<div class="label">Raw</div><audio controls preload="metadata" src="/audio/' + encoded + '/raw"></audio>';
    }
    function shortHash(value) {
      if (!value) return '';
      return String(value).slice(0, 12);
    }
    function queueSummary(rows) {
      const counts = new Map(rows.map((row) => [row.status, row.count]));
      return ['queued', 'processing', 'done', 'failed', 'failed_missing_file']
        .map((status) => status + ':' + (counts.get(status) ?? 0))
        .join(' / ');
    }
    function countStatuses(rows) {
      const counts = new Map();
      for (const row of rows) {
        counts.set(row.status, (counts.get(row.status) ?? 0) + 1);
      }
      return counts;
    }
    function runtimeValueClass(status) {
      if (['failed', 'blocked', 'not_installed', 'failed_missing_file'].includes(String(status))) {
        return 'error';
      }
      if ([
        'running',
        'queued',
        'processing',
        'partial',
        'countdown',
        'checking',
        'waiting_for_stt',
        'waiting_for_ai_provider',
        'waiting_ai',
        'stt',
      ].includes(String(status))) {
        return 'warn';
      }
      return 'status';
    }
    refresh();
    setInterval(refresh, 3000);
  </script>
</body>
</html>
