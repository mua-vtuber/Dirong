  <title>Dirong Recording + STT Dashboard</title>
  <style>
    /* Phase 6C foundation: structural dashboard layout without the legacy base theme. */
    * { box-sizing: border-box; }
    html { min-height: 100%; }
    body {
      margin: 0;
      min-height: 100vh;
    }
    body,
    button,
    input,
    textarea,
    select {
      font: inherit;
    }
    button,
    input,
    textarea,
    select {
      min-width: 0;
    }
    h1,
    h2,
    h3 {
      margin: 0;
    }
    section { margin: 0 0 22px; }
    code { font-family: var(--font-mono); font-size: 12px; }
    table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
    }
    th,
    td {
      padding: 8px 10px;
      text-align: left;
      vertical-align: top;
      font-size: 13px;
      overflow-wrap: anywhere;
    }
    pre {
      margin: 0;
      padding: 12px;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      max-height: 360px;
      overflow: auto;
      font-family: var(--font-mono);
      font-size: 13px;
    }
    audio { width: 220px; max-width: 100%; height: 32px; }
    button {
      cursor: pointer;
    }
    button:disabled { cursor: not-allowed; }
    textarea,
    input[type="number"],
    input[type="text"],
    input[type="password"],
    input[type="url"],
    select {
      width: 100%;
      padding: 7px;
    }
    textarea { min-height: 72px; resize: vertical; }
    input[type="number"] { max-width: 96px; }
    .grid,
    .pipeline-grid,
    .flow-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }
    .toolbar,
    .setup-actions,
    .status-chip-row,
    .summary-list,
    .stt-summary-list,
    .tab-row,
    .theme-options {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .toolbar,
    .setup-actions,
    .status-chip,
    .brand-block,
    .nav-button,
    .server-button,
    .setup-guild,
    .theme-options label,
    .flow-card-header,
    .section-heading {
      align-items: center;
    }
    .app-shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 220px minmax(0, 1fr);
    }
    .sidebar {
      position: sticky;
      top: 0;
      align-self: start;
      min-height: 100vh;
    }
    .brand-block,
    .nav-button,
    .server-button,
    .setup-guild,
    .status-chip,
    .theme-options label,
    .flow-card-header,
    .section-heading {
      display: flex;
      gap: 8px;
    }
    .brand-avatar {
      width: 34px;
      height: 34px;
      object-fit: contain;
      flex: 0 0 auto;
    }
    .nav-stack,
    .setup-steps,
    .setup-form,
    .setup-guild-list,
    .relation-fields {
      display: grid;
    }
    .nav-button,
    .server-button {
      width: 100%;
      justify-content: space-between;
      text-align: left;
    }
    .main-shell {
      min-width: 0;
      width: 100%;
      margin: 0 auto;
    }
    .content-header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
    }
    .status-chip {
      white-space: nowrap;
    }
    .status-dot,
    .card-state {
      flex: 0 0 auto;
    }
    .sticky-warning {
      position: sticky;
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .sticky-warning.is-visible { display: flex; }
    .app-view[hidden] { display: none; }
    .flow-grid { margin-bottom: 18px; }
    .flow-card {
      display: grid;
      gap: 8px;
      align-content: start;
    }
    .flow-card-header,
    .section-heading {
      justify-content: space-between;
    }
    .locked-grid,
    .setup-status-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }
    .participant-list,
    .required-field-grid,
    .settings-grid,
    .setup-cards {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .setup-cards + .setup-cards,
    .setup-cards + .setup-form {
      margin-top: 12px;
    }
    .tab-row {
      overflow-x: auto;
      flex-wrap: nowrap;
    }
    .tab-button,
    .theme-options label {
      white-space: nowrap;
    }
    .setup-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }
    .setup-layout {
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr);
      gap: 16px;
    }
    .setup-steps,
    .setup-form,
    .setup-guild-list,
    .relation-fields {
      gap: 10px;
    }
    .setup-step,
    .setup-card,
    .setup-guild {
      width: 100%;
      text-align: left;
    }
    .setup-step {
      min-height: 64px;
      display: flex;
      align-items: center;
      padding: 12px 14px;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0;
      line-height: 1.35;
      text-transform: none;
      white-space: normal;
      overflow-wrap: anywhere;
    }
    .setup-progress {
      min-width: 128px;
      text-align: right;
    }
    .setup-progress-panel {
      display: grid;
      gap: 8px;
      justify-items: end;
    }
    .setup-card {
      display: block;
      cursor: pointer;
      line-height: 1.45;
    }
    .setup-card input,
    .setup-guild input {
      width: auto;
      margin: 0 7px 0 0;
    }
    .setup-form label {
      display: grid;
      gap: 5px;
    }
    .setup-result:empty { display: none; }
    .display-details-table pre { max-height: 180px; }
    :root {

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-body);
      font-size: 14px;
      line-height: 1.5;
      letter-spacing: 0;
      font-feature-settings: "tnum" 1, "ss01" 1;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }
    a { color: var(--accent-strong); }

      font-family: var(--font-display);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    code,
    pre,
    .label,
    .muted,
    .status-chip,
    .summary-pill,
    .stt-summary-box,

      font-family: var(--font-mono);
    }
    .app-shell {
      grid-template-columns: 220px minmax(0, 1fr);
      background: transparent;
    }
    .sidebar {
      background: var(--sidebar);
      border-right: 1px solid var(--sidebar-line);

      color: var(--sidebar-ink);
    }

    .flow-card .value {
      color: var(--paper-muted);
      font-size: 13px;
    }
    .flow-card.tone-ready { background: var(--ready-bg); border-color: var(--ready-line); }
    .flow-card.tone-progress { background: var(--progress-bg); border-color: var(--progress-line); }
    .flow-card.tone-danger { background: var(--danger-bg); border-color: var(--danger-line); }
    .flow-card.tone-muted { background: var(--panel); border-color: var(--line); }
    .card-state {
      width: 10px;
      height: 10px;
      border: 0;
      box-shadow: none;
    }
    .content-band {
      margin-bottom: 12px;
    }
    #settingsPanel > .metric + .metric,
    #notion > .metric + .metric,
    #notionProperties > .metric + .metric {
      margin-top: 10px;
    }
    .section-heading {
      border-bottom: 1px solid var(--line);
      padding-bottom: 10px;
      margin-bottom: 12px;
    }
    .summary-list,
    .stt-summary-list {
      gap: 7px;
    }
    .summary-pill,
    #metrics .summary-pill,
    #metrics .summary-pill-stt,
    .stt-summary-box {
      min-height: 28px;
      padding: 5px 8px;
      border: 1px solid var(--line);
      background: var(--panel-soft);
      color: var(--paper-muted);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.05em;
      box-shadow: none;
    }
    .summary-pill-stt.tone-ready,
    .stt-summary-box.tone-ready,
    #metrics .summary-pill.tone-ready {
      background: var(--ready-bg);
      color: var(--ready-ink);
    }
    .summary-pill-stt.tone-danger,
    .stt-summary-box.tone-danger,
    #metrics .summary-pill.tone-danger {
      background: var(--danger-bg);
      color: var(--danger-ink);
    }
    table {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--paper-ink);
      box-shadow: none;
    }
    th {
      background: var(--bg-alt);
      color: var(--paper-faint);
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    td {
      border-bottom: 1px solid var(--line);
      color: var(--paper-muted);
    }
    tr:hover td {
      background: var(--row-hover);
    }
    pre {
      background: var(--bg-alt);
      border: 1px solid var(--line);
      color: var(--paper-muted);
    }
    audio {
      filter: grayscale(1) contrast(0.9);
      height: 30px;
    }
    .participant-item,
    .required-field,
    .setup-card,
    .setup-status-card,
    .setup-guild {
      background: var(--panel-soft);
      border-color: var(--line);
    }
    .required-field-grid {
      margin-top: 10px;
    }
    .required-field.is-missing,
    #dbPanel .required-field.is-missing {
      background: var(--danger-bg);
      border: 1px solid var(--danger-line);
      color: var(--danger-ink);
      box-shadow: none;
    }
    #dbPanel .required-field.is-missing .value,
    #dbPanel .required-field.is-missing .muted,
    .required-field.is-missing .value,
    .required-field.is-missing .muted {
      color: var(--danger-ink);
    }
    .locked-card {
      background: var(--danger-bg);
      border: 1px solid var(--danger-line);
      color: var(--danger-ink);
    }
    .locked-card .label,
    .locked-card .muted,
    .locked-card code {
      color: var(--danger-ink);
    }
    .sticky-warning {
      top: 0;
      z-index: 5;
      margin: 0;
      padding: 12px 22px;
      background: var(--danger-bg);
      border-bottom: 1px solid var(--danger-line);
      color: var(--danger-ink);
      box-shadow: none;
    }
    .sticky-warning strong,
    .sticky-warning span {
      color: var(--danger-ink);
    }
    .sticky-warning button {
      border-color: var(--danger-line);
      background: transparent;
      color: var(--danger-ink);
    }
    .tab-row {
      gap: 0;
      padding-bottom: 0;
      border-bottom: 1px solid var(--line);
    }
    .tab-button {
      min-height: 36px;
      border: 1px solid transparent;
      border-bottom: 0;
      background: transparent;
      color: var(--muted);
      box-shadow: none;
    }
    .tab-button:hover {
      background: var(--panel-soft);
      border-color: var(--line);
      transform: none;
      box-shadow: none;
    }
    .tab-button.is-active {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--on-accent);
      box-shadow: none;
    }
    .theme-options label {
      border: 1px solid var(--line);
      background: var(--panel-soft);
      color: var(--paper-ink);
      font-weight: 800;
    }
    .setup-step.is-active,
    .setup-card.is-selected {
      border-color: var(--accent);
      color: var(--accent-strong);
      box-shadow: inset 4px 0 0 var(--accent);
    }
    .setup-actions {
      margin-top: 12px;
    }
    .setup-help-grid {
      display: grid;
      gap: 10px;
      margin: 12px 0;
    }
    .setup-help {
      padding: 12px 14px;
      border: 1px solid var(--line);
      background: var(--panel-soft);
      color: var(--paper-ink);
    }
    .setup-connection-card {
      margin-top: 18px;
    }
    .setup-help h4 {
      margin: 0 0 8px;
      font-size: 14px;
      line-height: 1.35;
    }
    .setup-help p {
      margin: 0;
      line-height: 1.5;
    }
    .setup-help ol {
      margin: 0;
      padding-left: 20px;
    }
    .setup-help li {
      margin: 0 0 6px;
      line-height: 1.55;
      overflow-wrap: anywhere;
    }
    .setup-help li:last-child {
      margin-bottom: 0;
    }
    .setup-notice {
      margin: 10px 0 0;
      padding: 10px 12px;
      border-left: 4px solid var(--warn);
      background: var(--progress-bg);
      color: var(--progress-ink);
    }
    .setup-ok {
      border-left-color: var(--success);
      background: var(--ready-bg);
      color: var(--ready-ink);
    }
    .setup-error {
      border-left-color: var(--error);
      background: var(--danger-bg);
      color: var(--danger-ink);
    }
    #chunks table,
    #transcripts table,
    #draftPreview pre,
    #dbPanel table {
      border: 1px solid var(--line);
    }
    body :where(
      button,
      textarea,
      input,
      select,
      table,
      pre,
      details,
      summary,
      audio,
      .brand-avatar,
      .nav-button,
      .server-button,
      .status-chip,
      .flow-card,
      .content-band,
      .locked-card,
      .metric,
      .setup-shell,
      .setup-step,
      .setup-panel,
      .setup-card,
      .setup-result,
      .setup-status-card,
      .setup-guild,
      .setup-help,
      .setup-notice,
      .summary-pill,
      .participant-item,
      .required-field,
      .tab-button,
      .theme-options label,
      .display-details-table,
      .relation-fields
    ) {
      border-radius: 0 !important;
    }
    .status-dot,
    .card-state,
    input[type="radio"],
    input[type="checkbox"] {
      border-radius: 50% !important;
    }
    @media (max-width: 860px) {
      .app-shell { grid-template-columns: 1fr; }
      .sidebar {
        position: relative;
        min-height: auto;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }
      .main-shell { padding: 14px; }
      .sticky-warning { margin: -14px -14px 14px; padding: 10px 14px; align-items: flex-start; }
      .content-header { display: block; }
      .status-chip-row { justify-content: flex-start; margin-top: 10px; }
      .flow-grid, .locked-grid, .settings-grid, .participant-list, .required-field-grid {
        grid-template-columns: 1fr;
      }
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .pipeline-grid { grid-template-columns: repeat(1, minmax(0, 1fr)); }
      .setup-layout { grid-template-columns: 1fr; }
      .setup-cards { grid-template-columns: 1fr; }
      .setup-status-grid { grid-template-columns: 1fr; }
      .setup-progress { text-align: left; }
      .setup-progress-panel { justify-items: start; margin-top: 10px; }
      .setup-top { display: block; }
      main { padding: 14px; }
      th, td { font-size: 12px; padding: 7px; }
      .main-shell { padding: 14px; }
      .sticky-warning { margin: -14px -14px 14px; padding: 10px 14px; }
      .content-header h1 { font-size: 22px; }
      .status-chip { flex: 1 1 156px; justify-content: space-between; }
      .flow-card { min-height: auto; }
      .content-band { overflow-x: auto; }
      .content-band table { min-width: 620px; }
      .display-details-table { min-width: 0; }
      .sticky-warning button { min-width: 94px; }
      .tab-row { padding-bottom: 8px; }
      .tab-button { border: 1px solid var(--line); border-radius: 0; }
      .tab-button.is-active { box-shadow: 0 2px 0 var(--inner-frame-line); }
    }
  </style>
</head>
<body data-theme="system">
  <div class="app-shell">
    <aside class="sidebar" aria-label="Dirong navigation">
      <div class="brand-block">
        <img class="brand-avatar" src="/assets/dirong/dirong_head.png" alt="">
        <div>
          <div class="brand-title">Dirong</div>
          <div class="brand-subtitle">Recording + STT Dashboard</div>
        </div>
      </div>
      <div class="sidebar-group">
        <div class="sidebar-label" data-i18n="dashboard.sidebar.servers.label">SERVERS</div>
        <div id="sidebarServers"></div>
      </div>
      <div class="sidebar-group">
        <div class="sidebar-label" data-i18n="dashboard.sidebar.sections.label">SECTIONS</div>
        <nav id="sectionNav" class="nav-stack"></nav>
      </div>
      <div class="sidebar-group">
        <div class="sidebar-label" data-i18n="dashboard.sidebar.quick.label">QUICK</div>
        <div id="quickActions" class="nav-stack"></div>
      </div>
    </aside>
    <main class="main-shell">
      <div id="setupIncompleteBanner" class="sticky-warning"></div>
      <header class="content-header">
        <div>
          <h1 id="viewTitle">Dirong Recording + STT Dashboard</h1>
          <div class="muted" id="generatedAt">loading</div>
        </div>
        <div class="status-chip-row" id="statusChips"></div>
      </header>

      <section id="setupView" class="app-view setup-view" hidden>
        <section id="setupWizard" class="setup-shell"></section>
      </section>

      <section id="dashboardView" class="app-view">
        <div id="lockedCards"></div>
        <section class="flow-grid" id="pipeline"></section>
        <section class="content-band">
          <div class="section-heading">
            <h2 id="audioTitle">Audio / Transcripts</h2>
          </div>
          <div id="metrics"></div>
          <div id="chunks"></div>
          <div id="transcripts"></div>
        </section>
        <section class="content-band">
          <div class="section-heading">
            <h2 id="notesTitle">Meeting Notes</h2>
          </div>
          <div id="draftPreview"></div>
        </section>
      </section>

      <section id="dbView" class="app-view" hidden>
        <div class="tab-row" id="dbTabs"></div>
        <section class="content-band" id="dbPanel">
          <div id="notion"></div>
          <div id="notionProperties"></div>
        </section>
      </section>

      <section id="logsView" class="app-view" hidden>
        <div class="tab-row" id="logFilters"></div>
        <section class="content-band" id="needsAttentionSection">
          <div class="section-heading">
            <h2 id="needsAttentionTitle">Needs Attention</h2>
          </div>
          <div id="repairs"></div>
        </section>
        <section class="content-band" id="timelineSection">
          <div class="section-heading">
            <h2 id="timelineTitle">Event Timeline</h2>
          </div>
          <div id="events"></div>
        </section>
        <section class="content-band" id="sttQueueSection">
          <div class="section-heading">
            <h2 id="sttQueueTitle"></h2>
          </div>
          <div id="sttJobs"></div>
        </section>
        <section class="content-band" id="aiCleanupSection">
          <div class="section-heading">
            <h2 id="aiCleanupTitle"></h2>
          </div>
          <div id="aiCleanup"></div>
        </section>
      </section>

      <section id="settingsView" class="app-view" hidden>
        <div class="tab-row" id="settingsTabs"></div>
        <section class="content-band" id="settingsPanel"></section>
      </section>
    </main>
  </div>
  <script src="/dashboard/api-client.js"></script>
  <script src="/dashboard/setup-wizard.js"></script>
  <script src="/dashboard/notion-properties.js"></script>
  <script src="/dashboard/notion-managed-db.js"></script>
  <script src="/dashboard/dashboard-client.js"></script>
</body>
</html>
